<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Jindal Stainless Limited — TMT Rebar Inventory & Order Control</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --bg:#15171a;
    --surface:#1f2226;
    --surface2:#282c31;
    --surface3:#32373d;
    --accent:#e8590c;
    --accent-dim:#7a3210;
    --amber:#f5a623;
    --text:#e9e7e2;
    --text-dim:#9098a1;
    --text-faint:#5d646d;
    --success:#5fb878;
    --danger:#e5484d;
    --border:#383d44;
    --font-display:'Oswald',sans-serif;
    --font-body:'Inter',sans-serif;
    --font-mono:'IBM Plex Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:var(--font-body);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  ::selection{background:var(--accent);color:#fff;}

  /* ===== Layout ===== */
  .app{display:grid;grid-template-columns:230px 1fr;min-height:100vh;}
  @media (max-width:860px){.app{grid-template-columns:1fr;}}

  /* ===== Sidebar ===== */
  .sidebar{
    background:var(--surface);
    border-right:1px solid var(--border);
    padding:24px 16px;
    display:flex;flex-direction:column;
    position:sticky;top:0;height:100vh;
  }
  @media (max-width:860px){.sidebar{position:relative;height:auto;flex-direction:row;align-items:center;overflow-x:auto;padding:14px 16px;gap:8px;}}
  .brand{
    font-family:var(--font-display);
    font-size:20px;font-weight:700;letter-spacing:0.5px;
    color:var(--text);margin-bottom:4px;
    display:flex;align-items:center;gap:10px;
  }
  .brand .mark{
    width:30px;height:30px;flex:none;
  }
  .brand-sub{
    font-family:var(--font-mono);
    font-size:10px;color:var(--text-faint);
    letter-spacing:1.5px;text-transform:uppercase;
    margin-bottom:28px;
  }
  @media (max-width:860px){.brand-sub{display:none;} .brand{margin-bottom:0;margin-right:10px;}}
  .nav{display:flex;flex-direction:column;gap:2px;}
  @media (max-width:860px){.nav{flex-direction:row;}}
  .nav button{
    all:unset;cursor:pointer;
    display:flex;align-items:center;gap:10px;
    padding:10px 12px;border-radius:6px;
    font-family:var(--font-body);font-size:13.5px;font-weight:600;
    color:var(--text-dim);white-space:nowrap;
    transition:background .15s,color .15s;
  }
  .nav button:hover{background:var(--surface2);color:var(--text);}
  .nav button.active{background:var(--accent-dim);color:var(--amber);}
  .nav button .dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex:none;}
  .sidebar-foot{margin-top:auto;font-family:var(--font-mono);font-size:10px;color:var(--text-faint);line-height:1.6;}
  @media (max-width:860px){.sidebar-foot{display:none;}}

  /* ===== Main ===== */
  .main{padding:28px 36px 60px;max-width:1300px;}
  @media (max-width:600px){.main{padding:18px 16px 40px;}}
  .page-head{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:14px;margin-bottom:26px;}
  .page-title{font-family:var(--font-display);font-size:30px;font-weight:600;letter-spacing:0.3px;}
  .page-desc{color:var(--text-dim);font-size:13.5px;margin-top:4px;}

  .btn{
    all:unset;cursor:pointer;
    font-family:var(--font-body);font-weight:600;font-size:13px;
    padding:10px 18px;border-radius:6px;
    background:var(--accent);color:#fff;
    transition:filter .15s, transform .1s;
  }
  .btn:hover{filter:brightness(1.12);}
  .btn:active{transform:scale(0.97);}
  .btn.secondary{background:var(--surface3);color:var(--text);}
  .btn.danger{background:transparent;color:var(--danger);border:1px solid var(--danger);}
  .btn.small{padding:6px 12px;font-size:12px;}

  /* ===== Stat cards ===== */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:32px;}
  @media (max-width:860px){.stats{grid-template-columns:repeat(2,1fr);}}
  @media (max-width:480px){.stats{grid-template-columns:1fr;}}
  .stat{
    background:var(--surface);border:1px solid var(--border);
    border-radius:10px;padding:18px 18px 16px;
    position:relative;overflow:hidden;
  }
  .stat::before{
    content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--bar);
  }
  .stat .label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text-faint);font-weight:600;}
  .stat .value{font-family:var(--font-display);font-size:30px;margin-top:6px;font-weight:600;}
  .stat .sub{font-size:11.5px;color:var(--text-dim);margin-top:4px;font-family:var(--font-mono);}

  /* ===== Sections / cards ===== */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:22px;margin-bottom:24px;}
  .card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
  .card-title{font-family:var(--font-display);font-size:17px;font-weight:600;letter-spacing:0.3px;}
  .card-title .count{color:var(--text-faint);font-family:var(--font-mono);font-size:12px;margin-left:8px;}

  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{
    text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:0.8px;
    color:var(--text-faint);font-weight:600;padding:8px 10px;border-bottom:1px solid var(--border);
  }
  td{padding:10px 10px;border-bottom:1px solid var(--surface2);font-family:var(--font-mono);font-size:12.5px;vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:var(--surface2);}
  td.name{font-family:var(--font-body);font-weight:500;}

  .pill{
    display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;
    font-family:var(--font-body);letter-spacing:0.2px;
  }
  .pill.ok{background:rgba(95,184,120,.15);color:var(--success);}
  .pill.low{background:rgba(245,166,35,.15);color:var(--amber);}
  .pill.crit{background:rgba(229,72,77,.15);color:var(--danger);}
  .pill.pending{background:rgba(245,166,35,.15);color:var(--amber);}
  .pill.fulfilled{background:rgba(95,184,120,.15);color:var(--success);}
  .pill.partial{background:rgba(232,89,12,.15);color:var(--accent);}

  /* stock gauge bars - signature element */
  .gauge-wrap{display:flex;align-items:center;gap:8px;}
  .gauge{width:80px;height:8px;background:var(--surface3);border-radius:4px;overflow:hidden;flex:none;}
  .gauge-fill{height:100%;border-radius:4px;}
  .gauge-pct{font-family:var(--font-mono);font-size:11px;color:var(--text-dim);width:34px;}

  /* rebar stack visual for dashboard */
  .rebar-yard{display:flex;align-items:flex-end;gap:14px;height:160px;padding:10px 6px 0;overflow-x:auto;}
  .rebar-col{display:flex;flex-direction:column;align-items:center;gap:8px;min-width:46px;flex:none;}
  .rebar-stack{display:flex;flex-direction:column-reverse;gap:3px;align-items:center;height:120px;justify-content:flex-start;}
  .rebar-rod{border-radius:3px;background:linear-gradient(90deg,#8a5a2e,#c98a44 50%,#8a5a2e);box-shadow:inset 0 1px 1px rgba(255,255,255,.25);}
  .rebar-label{font-family:var(--font-mono);font-size:11px;color:var(--text-dim);}
  .rebar-qty{font-family:var(--font-mono);font-size:10px;color:var(--text-faint);}

  /* form */
  .form-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
  @media (max-width:760px){.form-grid{grid-template-columns:repeat(2,1fr);}}
  @media (max-width:460px){.form-grid{grid-template-columns:1fr;}}
  label{font-size:11px;color:var(--text-faint);font-weight:600;text-transform:uppercase;letter-spacing:0.6px;display:block;margin-bottom:5px;}
  input,select{
    width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);
    padding:9px 10px;border-radius:6px;font-family:var(--font-mono);font-size:12.5px;
  }
  input:focus,select:focus{outline:none;border-color:var(--accent);}
  .field{margin-bottom:0;}

  .empty{padding:30px;text-align:center;color:var(--text-faint);font-size:13px;}
  .empty b{color:var(--text-dim);}

  .upload-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
  .dropzone{
    flex:1;min-width:240px;
    border:1.5px dashed var(--border);border-radius:8px;
    padding:18px 16px;text-align:center;cursor:pointer;
    transition:border-color .15s, background .15s;
    font-size:12.5px;color:var(--text-dim);
  }
  .dropzone:hover, .dropzone.drag{border-color:var(--accent);background:rgba(232,89,12,.06);}
  .dropzone b{color:var(--text);}
  .dropzone .sub{font-family:var(--font-mono);font-size:11px;color:var(--text-faint);margin-top:4px;}
  .upload-summary{font-family:var(--font-mono);font-size:12px;color:var(--text-dim);margin-top:12px;line-height:1.7;}
  .upload-summary .new{color:var(--success);}
  .upload-summary .upd{color:var(--amber);}
  .upload-summary .err{color:var(--danger);}

  .toast{
    position:fixed;bottom:24px;right:24px;background:var(--surface3);border:1px solid var(--border);
    border-left:3px solid var(--accent);padding:14px 18px;border-radius:8px;font-size:13px;
    max-width:320px;box-shadow:0 8px 24px rgba(0,0,0,.4);
    animation:slidein .25s ease, fadeout .4s ease 2.6s forwards;
    z-index:999;
  }
  @keyframes slidein{from{transform:translateX(30px);opacity:0;}to{transform:translateX(0);opacity:1;}}
  @keyframes fadeout{to{opacity:0;transform:translateY(6px);}}

  .section-note{font-size:12px;color:var(--text-faint);margin-top:10px;font-family:var(--font-mono);}

  ::-webkit-scrollbar{height:8px;width:8px;}
  ::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:4px;}
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <svg class="mark" viewBox="0 0 30 30"><rect x="2" y="13" width="26" height="4" rx="2" fill="#e8590c"/><circle cx="6" cy="15" r="4.5" fill="#f5a623"/><circle cx="24" cy="15" r="4.5" fill="#f5a623"/></svg>
      JINDAL STAINLESS LIMITED
    </div>
    <div class="brand-sub">Inventory · Orders · Mill Plan</div>
    <nav class="nav" id="nav"></nav>
    <div class="sidebar-foot">
      Stock unit: Metric Tons (MT)<br>
      Grades: Fe500 / Fe500D / Fe550<br>
      Session data — resets on reload
    </div>
  </aside>

  <main class="main" id="main"></main>
</div>

<script>
/* ============== DATA MODEL ============== */
const DIAMETERS = [8,10,12,16,20,25,32];
const GRADES = ['Fe500','Fe500D','Fe550'];

let stock = [
  {dia:8,  grade:'Fe500',  qty:18.5, reorder:25, capacity:60},
  {dia:8,  grade:'Fe500D', qty:6.2,  reorder:15, capacity:40},
  {dia:10, grade:'Fe500',  qty:42.0, reorder:30, capacity:70},
  {dia:10, grade:'Fe500D', qty:11.0, reorder:20, capacity:50},
  {dia:12, grade:'Fe500',  qty:55.4, reorder:35, capacity:90},
  {dia:12, grade:'Fe550',  qty:9.8,  reorder:20, capacity:50},
  {dia:16, grade:'Fe500',  qty:28.0, reorder:35, capacity:80},
  {dia:16, grade:'Fe500D', qty:4.5,  reorder:18, capacity:45},
  {dia:20, grade:'Fe500',  qty:33.6, reorder:30, capacity:75},
  {dia:25, grade:'Fe500',  qty:12.2, reorder:25, capacity:60},
  {dia:25, grade:'Fe550',  qty:3.0,  reorder:12, capacity:30},
  {dia:32, grade:'Fe500',  qty:5.4,  reorder:15, capacity:40},
];

let orders = [
  {id:'ORD-1001', customer:'Shree Balaji Constructions', date:'2026-06-24',
    items:[ {dia:12, grade:'Fe500', qty:20, allocated:20, status:'fulfilled'}, {dia:16, grade:'Fe500D', qty:5, allocated:5, status:'fulfilled'} ]},
  {id:'ORD-1002', customer:'Vihaan Infra Pvt Ltd', date:'2026-06-26',
    items:[ {dia:25, grade:'Fe500', qty:18, allocated:0, status:'pending'}, {dia:8, grade:'Fe500', qty:6, allocated:0, status:'pending'} ]},
  {id:'ORD-1003', customer:'NorthGate Builders', date:'2026-06-27',
    items:[ {dia:8, grade:'Fe500D', qty:9, allocated:0, status:'pending'} ]},
  {id:'ORD-1004', customer:'Om Sai Developers', date:'2026-06-28',
    items:[ {dia:32, grade:'Fe500', qty:7, allocated:0, status:'pending'}, {dia:20, grade:'Fe500', qty:4, allocated:0, status:'pending'} ]},
];

let orderSeq = 1005;
let activeTab = 'dashboard';
let orderCart = []; // line items being built for a new order

/* ============== HELPERS ============== */
function findStock(dia,grade){ return stock.find(s=>s.dia===dia && s.grade===grade); }
function stockStatus(s){
  const pct = s.qty/s.reorder;
  if(s.qty <= 0) return 'crit';
  if(pct < 1) return 'low';
  return 'ok';
}
function fmt(n){ return Number(n).toFixed(1); }
function toast(msg){
  const t = document.createElement('div');
  t.className='toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 3000);
}
function manufacturingNeeds(){
  return stock
    .map(s=>({...s, deficit: Math.max(0, s.reorder - s.qty)}))
    .filter(s=>s.deficit > 0)
    .sort((a,b)=>b.deficit - a.deficit);
}
function pendingDemandFor(dia,grade){
  let total = 0;
  orders.forEach(o=> o.items.forEach(it=>{
    if(it.dia===dia && it.grade===grade && it.status!=='fulfilled') total += (it.qty - (it.allocated||0));
  }));
  return total;
}
function orderStatus(o){
  const statuses = o.items.map(it=>it.status);
  if(statuses.every(s=>s==='fulfilled')) return 'fulfilled';
  if(statuses.every(s=>s==='pending')) return 'pending';
  return 'partial';
}
function orderTotalQty(o){ return o.items.reduce((a,it)=>a+it.qty,0); }

/* ============== NAV ============== */
const TABS = [
  {id:'dashboard', label:'Dashboard'},
  {id:'orders', label:'Orders'},
  {id:'stock', label:'Stock Yard'},
  {id:'manufacture', label:'Manufacturing Plan'},
];
function renderNav(){
  const nav = document.getElementById('nav');
  nav.innerHTML = TABS.map(t=>`
    <button class="${t.id===activeTab?'active':''}" data-tab="${t.id}">
      <span class="dot"></span>${t.label}
    </button>`).join('');
  nav.querySelectorAll('button').forEach(b=>{
    b.addEventListener('click', ()=>{ activeTab=b.dataset.tab; render(); });
  });
}

/* ============== RENDER: DASHBOARD ============== */
function renderDashboard(){
  const totalStock = stock.reduce((a,s)=>a+s.qty,0);
  const lowCount = stock.filter(s=>stockStatus(s)!=='ok').length;
  const pendingOrders = orders.filter(o=>orderStatus(o)!=='fulfilled').length;
  const mfgNeeds = manufacturingNeeds();
  const totalDeficit = mfgNeeds.reduce((a,s)=>a+s.deficit,0);

  const maxQty = Math.max(...stock.map(s=>s.capacity));
  const byDia = DIAMETERS.map(d=>{
    const rows = stock.filter(s=>s.dia===d);
    const total = rows.reduce((a,s)=>a+s.qty,0);
    const cap = rows.reduce((a,s)=>a+s.capacity,0);
    return {dia:d, total, cap, status: rows.some(r=>stockStatus(r)!=='ok') ? (rows.some(r=>stockStatus(r)==='crit')?'crit':'low') : 'ok'};
  });

  const statusColor = {ok:'var(--success)', low:'var(--amber)', crit:'var(--danger)'};

  document.getElementById('main').innerHTML = `
    <div class="page-head">
      <div>
        <div class="page-title">Yard Overview</div>
        <div class="page-desc">Live snapshot of rebar stock, demand and mill requirements</div>
      </div>
    </div>

    <div class="stats">
      <div class="stat" style="--bar:var(--accent)">
        <div class="label">Total Stock</div>
        <div class="value">${fmt(totalStock)} MT</div>
        <div class="sub">across ${stock.length} dia/grade lines</div>
      </div>
      <div class="stat" style="--bar:var(--amber)">
        <div class="label">Below Reorder Level</div>
        <div class="value">${lowCount}</div>
        <div class="sub">lines need attention</div>
      </div>
      <div class="stat" style="--bar:var(--accent)">
        <div class="label">Pending Orders</div>
        <div class="value">${pendingOrders}</div>
        <div class="sub">awaiting dispatch</div>
      </div>
      <div class="stat" style="--bar:var(--danger)">
        <div class="label">Manufacturing Deficit</div>
        <div class="value">${fmt(totalDeficit)} MT</div>
        <div class="sub">${mfgNeeds.length} dia size${mfgNeeds.length===1?'':'s'} to roll</div>
      </div>
    </div>

    <div class="card">
      <div class="card-head">
        <div class="card-title">Stock Yard by Diameter <span class="count">visual stack, height = fill vs capacity</span></div>
      </div>
      <div class="rebar-yard">
        ${byDia.map(d=>{
          const pct = Math.max(0.04, d.total/d.cap);
          const rodCount = Math.max(1, Math.round(pct*10));
          const rodWidth = 18 + d.dia*0.6;
          let rods='';
          for(let i=0;i<rodCount;i++){
            rods += `<div class="rebar-rod" style="width:${rodWidth}px;height:7px;"></div>`;
          }
          return `<div class="rebar-col">
            <div class="rebar-stack">${rods}</div>
            <div class="rebar-label" style="color:${statusColor[d.status]}">⌀${d.dia}mm</div>
            <div class="rebar-qty">${fmt(d.total)}/${d.cap} MT</div>
          </div>`;
        }).join('')}
      </div>
      <div class="section-note">Bar height reflects current stock as a share of yard capacity for that diameter, combined across all grades.</div>
    </div>

    <div class="card">
      <div class="card-head">
        <div class="card-title">Top Manufacturing Priorities <span class="count">${mfgNeeds.length} item(s)</span></div>
        <button class="btn secondary small" data-goto="manufacture">View full plan →</button>
      </div>
      ${mfgNeeds.length===0 ? `<div class="empty">All dia/grade lines are at or above reorder level. <b>No manufacturing required.</b></div>` :
      `<table>
        <thead><tr><th>Diameter</th><th>Grade</th><th>Current</th><th>Reorder Level</th><th>Deficit</th><th></th></tr></thead>
        <tbody>
        ${mfgNeeds.slice(0,5).map(s=>`
          <tr>
            <td class="name">⌀${s.dia}mm</td>
            <td>${s.grade}</td>
            <td>${fmt(s.qty)} MT</td>
            <td>${fmt(s.reorder)} MT</td>
            <td><span class="pill ${stockStatus(s)}">${fmt(s.deficit)} MT short</span></td>
            <td></td>
          </tr>`).join('')}
        </tbody>
      </table>`}
    </div>
  `;
  document.querySelectorAll('[data-goto]').forEach(b=>b.addEventListener('click',()=>{activeTab=b.dataset.goto;render();}));
}

/* ============== RENDER: ORDERS ============== */
function renderOrders(){
  const sorted = [...orders].sort((a,b)=>{
    const sa = orderStatus(a), sb = orderStatus(b);
    const rank = {pending:0, partial:1, fulfilled:2};
    return rank[sa]-rank[sb];
  });

  document.getElementById('main').innerHTML = `
    <div class="page-head">
      <div>
        <div class="page-title">Customer Orders</div>
        <div class="page-desc">Place new orders — one customer can order multiple diameters in a single order — and dispatch against available stock</div>
      </div>
    </div>

    <div class="card">
      <div class="card-head"><div class="card-title">New Order</div></div>
      <div class="field" style="margin-bottom:14px;max-width:340px;">
        <label>Customer Name</label><input id="f-customer" placeholder="e.g. Shree Balaji Constructions">
      </div>

      <label style="margin-bottom:8px;">Order Lines</label>
      <div class="form-grid" style="margin-bottom:10px;">
        <div class="field"><label>Diameter (mm)</label>
          <select id="f-dia">${DIAMETERS.map(d=>`<option value="${d}">${d}mm</option>`).join('')}</select>
        </div>
        <div class="field"><label>Grade</label>
          <select id="f-grade">${GRADES.map(g=>`<option value="${g}">${g}</option>`).join('')}</select>
        </div>
        <div class="field"><label>Quantity (MT)</label><input id="f-qty" type="number" min="0.1" step="0.1" placeholder="e.g. 10"></div>
        <div class="field" style="display:flex;align-items:flex-end;"><button class="btn secondary" id="addLineBtn" style="width:100%;">+ Add Line</button></div>
      </div>

      ${orderCart.length>0 ? `
      <table style="margin-bottom:14px;">
        <thead><tr><th>Diameter</th><th>Grade</th><th>Qty</th><th></th></tr></thead>
        <tbody>
        ${orderCart.map((l,i)=>`
          <tr>
            <td>⌀${l.dia}mm</td><td>${l.grade}</td><td>${fmt(l.qty)} MT</td>
            <td><button class="btn danger small" data-remove-line="${i}">Remove</button></td>
          </tr>`).join('')}
        </tbody>
      </table>` : `<div class="section-note" style="margin-bottom:14px;">No lines added yet — add at least one diameter/grade/quantity line, then place the order.</div>`}

      <div style="display:flex;gap:10px;">
        <button class="btn" id="placeOrderBtn">Place Order${orderCart.length>1?` (${orderCart.length} lines)`:''}</button>
      </div>

function addOrderLine(){
  const dia = Number(document.getElementById('f-dia').value);
  const grade = document.getElementById('f-grade').value;
  const qty = Number(document.getElementById('f-qty').value);
  if(!qty || qty<=0){ toast('Enter a valid quantity before adding a line.'); return; }
  orderCart.push({dia, grade, qty});
  document.getElementById('f-qty').value = '';
  renderOrders();
}

function fulfillItem(item){
  const s = findStock(item.dia, item.grade);
  if(!item.allocated) item.allocated = 0;
  const remaining = item.qty - item.allocated;
  if(remaining<=0){ item.status='fulfilled'; return false; }
  if(!s || s.qty<=0) return false;
  const take = Math.min(s.qty, remaining);
  s.qty -= take;
  item.allocated += take;
  item.status = item.allocated >= item.qty ? 'fulfilled' : (item.allocated>0 ? 'partial' : 'pending');
  return take>0;
}

function placeOrder(){
  const customer = document.getElementById('f-customer').value.trim();
  if(!customer){ toast('Enter a customer name.'); return; }
  if(orderCart.length===0){ toast('Add at least one order line.'); return; }

  const id = 'ORD-'+(orderSeq++);
  const items = orderCart.map(l=>({dia:l.dia, grade:l.grade, qty:l.qty, allocated:0, status:'pending'}));
  const order = {id, customer, date: new Date().toISOString().slice(0,10), items};
  orders.push(order);

  let fulfilledCount = 0;
  items.forEach(it=>{ if(fulfillItem(it)) fulfilledCount++; });

  orderCart = [];
  const st = orderStatus(order);
  toast(`${id} placed (${items.length} line${items.length===1?'':'s'}) — ${st==='fulfilled'?'fully fulfilled':st==='partial'?'partially fulfilled':'pending, insufficient stock'}.`);
  render();
}

function tryFulfillOrder(id){
  const o = orders.find(x=>x.id===id);
  if(!o) return;
  let changed = 0;
  o.items.forEach(it=>{ if(it.status!=='fulfilled' && fulfillItem(it)) changed++; });
  if(changed>0){ toast(`${id}: ${changed} line(s) fulfilled from stock.`); }
  else { toast(`${id}: still short on stock for remaining line(s).`); }
  render();
}

function deleteOrder(id){
  const o = orders.find(x=>x.id===id);
  if(!o) return;
  if(!confirm(`Delete order ${id} for ${o.customer}? Any allocated stock (fulfilled or partially fulfilled lines) will be returned to inventory.`)) return;
  o.items.forEach(it=>{
    const allocated = it.allocated||0;
    if(allocated>0){
      const s = findStock(it.dia, it.grade);
      if(s) s.qty += allocated;
    }
  });
  orders = orders.filter(x=>x.id!==id);
  toast(`${id} deleted and any allocated stock restored.`);
  render();
}

/* ============== ORDER EXCEL UPLOAD ============== */
function handleOrderExcelFile(file){
  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, {type:'array'});
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, {defval:''});
      processUploadedOrderRows(rows, file.name);
    }catch(err){
      showOrderUploadSummary({ordersCreated:0, linesAdded:0, errors:[`Could not read "${file.name}": ${err.message}`]});
    }
  };
  reader.onerror = function(){
    showOrderUploadSummary({ordersCreated:0, linesAdded:0, errors:[`Failed to load "${file.name}".`]});
  };
  reader.readAsArrayBuffer(file);
}

function processUploadedOrderRows(rows, filename){
  const errors = [];
  const groups = {}; // key: customer||date -> {customer, date, items:[]}

  rows.forEach((row, idx)=>{
    const rowNum = idx+2;
    const customerRaw = pickValue(row, ['customer','customername','client']);
    const diaRaw = pickValue(row, ['diameter','dia','size','diametermm']);
    const gradeRaw = pickValue(row, ['grade','steelgrade']);
    const qtyRaw = pickValue(row, ['quantity','qty','quantitymt']);
    const dateRaw = pickValue(row, ['date','orderdate']);

    if(customerRaw===undefined || diaRaw===undefined || gradeRaw===undefined || qtyRaw===undefined){
      errors.push(`Row ${rowNum}: missing Customer, Diameter, Grade, or Quantity — skipped.`);
      return;
    }
    const dia = parseInt(String(diaRaw).replace(/[^0-9.]/g,''), 10);
    const grade = String(gradeRaw).trim();
    const qty = parseFloat(qtyRaw);
    const customer = String(customerRaw).trim();
    let date = dateRaw ? String(dateRaw).trim() : new Date().toISOString().slice(0,10);
    if(date.length===10 && date.includes('/')) {
      // try normalize dd/mm/yyyy style, fallback to original string if odd
      const parts = date.split('/');
      if(parts.length===3) date = `${parts[2]}-${parts[1].padStart(2,'0')}-${parts[0].padStart(2,'0')}`;
    }

    if(!dia || isNaN(qty) || !customer){
      errors.push(`Row ${rowNum}: invalid customer, diameter, or quantity — skipped.`);
      return;
    }

    const key = customer+'||'+date;
    if(!groups[key]) groups[key] = {customer, date, items:[]};
    groups[key].items.push({dia, grade, qty, allocated:0, status:'pending'});
  });

  let ordersCreated = 0, linesAdded = 0;
  Object.values(groups).forEach(g=>{
    const id = 'ORD-'+(orderSeq++);
    g.items.forEach(it=>fulfillItem(it));
    orders.push({id, customer:g.customer, date:g.date, items:g.items});
    ordersCreated++;
    linesAdded += g.items.length;
  });

  showOrderUploadSummary({ordersCreated, linesAdded, errors, filename});
  render();
}

function showOrderUploadSummary({ordersCreated, linesAdded, errors, filename}){
  const box = document.getElementById('orderUploadSummary');
  if(!box){ toast(`Order upload processed: ${ordersCreated} orders, ${linesAdded} lines.`); return; }
  let html = `<div class="upload-summary">`;
  if(filename) html += `Processed <b style="color:var(--text)">${filename}</b><br>`;
  html += `<span class="new">${ordersCreated} order(s) created</span> · <span class="upd">${linesAdded} line(s) added</span>`;
  if(errors.length){
    html += `<br><span class="err">${errors.length} row(s) skipped:</span><br>` + errors.slice(0,6).map(e=>`&nbsp;&nbsp;${e}`).join('<br>');
    if(errors.length>6) html += `<br>&nbsp;&nbsp;...and ${errors.length-6} more.`;
  }
  html += `</div>`;
  box.innerHTML = html;
  toast(`Order file processed: ${ordersCreated} orders, ${linesAdded} lines.`);
}

/* ============== EXCEL UPLOAD ============== */
function normalizeKey(k){
  return String(k).toLowerCase().replace(/[^a-z0-9]/g,'');
}
function pickValue(row, candidates){
  const map = {};
  Object.keys(row).forEach(k=> map[normalizeKey(k)] = row[k]);
  for(const c of candidates){
    if(map[normalizeKey(c)] !== undefined && map[normalizeKey(c)] !== '') return map[normalizeKey(c)];
  }
  return undefined;
}

function handleExcelFile(file){
  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, {type:'array'});
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, {defval:''});
      processUploadedRows(rows, file.name);
    }catch(err){
      showUploadSummary({added:0, updated:0, errors:[`Could not read "${file.name}": ${err.message}`]});
    }
  };
  reader.onerror = function(){
    showUploadSummary({added:0, updated:0, errors:[`Failed to load "${file.name}".`]});
  };
  reader.readAsArrayBuffer(file);
}

function processUploadedRows(rows, filename){
  let added = 0, updated = 0;
  const errors = [];

  rows.forEach((row, idx)=>{
    const rowNum = idx+2; // account for header row
    const diaRaw = pickValue(row, ['diameter','dia','size','diametermm']);
    const gradeRaw = pickValue(row, ['grade','steelgrade']);
    const qtyRaw = pickValue(row, ['quantity','qty','quantitymt','stock','currentstock']);
    const reorderRaw = pickValue(row, ['reorderlevel','reorder','reorderqty','minlevel']);
    const capacityRaw = pickValue(row, ['capacity','yardcapacity','maxcapacity']);

    if(diaRaw===undefined || gradeRaw===undefined || qtyRaw===undefined){
      errors.push(`Row ${rowNum}: missing Diameter, Grade, or Quantity — skipped.`);
      return;
    }

    const dia = parseInt(String(diaRaw).replace(/[^0-9.]/g,''), 10);
    const grade = String(gradeRaw).trim();
    const qty = parseFloat(qtyRaw);

    if(!dia || isNaN(qty)){
      errors.push(`Row ${rowNum}: invalid diameter or quantity — skipped.`);
      return;
    }

    let s = findStock(dia, grade);
    if(s){
      s.qty = qty;
      if(reorderRaw!==undefined && !isNaN(parseFloat(reorderRaw))) s.reorder = parseFloat(reorderRaw);
      if(capacityRaw!==undefined && !isNaN(parseFloat(capacityRaw))) s.capacity = parseFloat(capacityRaw);
      updated++;
    } else {
      s = {
        dia, grade, qty,
        reorder: (reorderRaw!==undefined && !isNaN(parseFloat(reorderRaw))) ? parseFloat(reorderRaw) : Math.round(qty*0.6),
        capacity: (capacityRaw!==undefined && !isNaN(parseFloat(capacityRaw))) ? parseFloat(capacityRaw) : Math.round(qty*2.5) || 40,
      };
      stock.push(s);
      added++;
    }
  });

  showUploadSummary({added, updated, errors, filename});
  render();
}

function showUploadSummary({added, updated, errors, filename}){
  const box = document.getElementById('uploadSummary');
  if(!box) { toast(`Upload processed: ${added} added, ${updated} updated.`); return; }
  let html = `<div class="upload-summary">`;
  if(filename) html += `Processed <b style="color:var(--text)">${filename}</b><br>`;
  html += `<span class="new">${added} line(s) added</span> · <span class="upd">${updated} line(s) updated</span>`;
  if(errors.length){
    html += `<br><span class="err">${errors.length} row(s) skipped:</span><br>` + errors.slice(0,6).map(e=>`&nbsp;&nbsp;${e}`).join('<br>');
    if(errors.length>6) html += `<br>&nbsp;&nbsp;...and ${errors.length-6} more.`;
  }
  html += `</div>`;
  box.innerHTML = html;
  toast(`Stock file processed: ${added} added, ${updated} updated.`);
}

    s = {dia, grade, qty:0, reorder:20, capacity:50};
    stock.push(s);
  }
  s.qty += qty;
  toast(`Added ${fmt(qty)} MT to ⌀${dia}mm ${grade} stock.`);

function deleteStockLine(dia, grade){
  const s = findStock(dia, grade);
  if(!s) return;
  const demand = pendingDemandFor(dia, grade);
  const warn = demand>0 ? ` There is ${fmt(demand)} MT of unfulfilled order demand for this line.` : '';
  if(!confirm(`Delete ⌀${dia}mm ${grade} stock line (${fmt(s.qty)} MT)?${warn}`)) return;
  stock = stock.filter(x=>!(x.dia===dia && x.grade===grade));
  toast(`⌀${dia}mm ${grade} stock line deleted.`);
  render();
}

/* ============== RENDER: MANUFACTURING PLAN ============== */
function renderManufacture(){
  const needs = manufacturingNeeds();
  const enriched = needs.map(s=>{
    const demand = pendingDemandFor(s.dia,s.grade);
    const recommend = Math.max(s.deficit, demand - s.qty);
    return {...s, demand, recommend: Math.max(0,recommend)};
  });
  const totalRecommend = enriched.reduce((a,s)=>a+s.recommend,0);

  document.getElementById('main').innerHTML = `
    <div class="page-head">
      <div>
        <div class="page-title">Manufacturing Plan</div>
        <div class="page-desc">Diameters that have fallen below reorder level, ranked by what the mill should roll next</div>
      </div>
    </div>

    <div class="stats" style="grid-template-columns:repeat(3,1fr);">
      <div class="stat" style="--bar:var(--danger)">
        <div class="label">Lines Needing Production</div>
        <div class="value">${enriched.length}</div>
        <div class="sub">out of ${stock.length} total lines</div>
      </div>
      <div class="stat" style="--bar:var(--amber)">
        <div class="label">Recommended Roll Quantity</div>
        <div class="value">${fmt(totalRecommend)} MT</div>
        <div class="sub">covers reorder buffer + open orders</div>
      </div>
      <div class="stat" style="--bar:var(--accent)">
        <div class="label">Open Order Demand</div>
        <div class="value">${fmt(orders.reduce((a,o)=>a+o.items.filter(it=>it.status!=='fulfilled').reduce((s,it)=>s+(it.qty-(it.allocated||0)),0),0))} MT</div>
        <div class="sub">across pending orders</div>
      </div>
    </div>

    <div class="card">
      <div class="card-head">
        <div class="card-title">Production Priority Queue</div>
      </div>
      ${enriched.length===0 ? `<div class="empty">Every diameter and grade is at or above its reorder level. <b>Mill is idle on rebar — no urgent rolling needed.</b></div>` :
      `<table>
        <thead><tr><th>Priority</th><th>Diameter</th><th>Grade</th><th>Current Stock</th><th>Reorder Level</th><th>Pending Orders</th><th>Recommended to Roll</th></tr></thead>
        <tbody>
        ${enriched.map((s,i)=>`
          <tr>
            <td>${i+1}</td>
            <td class="name">⌀${s.dia}mm</td>
            <td>${s.grade}</td>
            <td>${fmt(s.qty)} MT</td>
            <td>${fmt(s.reorder)} MT</td>
            <td>${s.demand>0 ? fmt(s.demand)+' MT' : '—'}</td>
            <td><span class="pill ${i===0?'crit':'low'}">${fmt(s.recommend)} MT</span></td>
          </tr>`).join('')}
        </tbody>
      </table>`}
      <div class="section-note">Recommended quantity = max(reorder shortfall, unfulfilled order demand minus current stock). Adjust reorder levels in code to match real safety-stock policy.</div>
    </div>
  `;
}

  else if(activeTab==='orders') renderOrders();
  else if(activeTab==='stock') renderStock();
  else if(activeTab==='manufacture') renderManufacture();
}
