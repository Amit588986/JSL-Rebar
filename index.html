<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Jindal Stainless Limited — TMT Rebar Inventory & Order Control</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#15171a;
    --surface:#1f2226;
    --surface2:#282c31;
    --surface3:#32373d;
    --accent:#e8590c;
    --accent-dim:#7a3210;
    --amber:#f5a623;
    --text:#e9e7e2;
    --text-dim:#9098a1;
    --text-faint:#5d646d;
    --success:#5fb878;
    --danger:#e5484d;
    --border:#383d44;
    --font-display:'Oswald',sans-serif;
    --font-body:'Inter',sans-serif;
    --font-mono:'IBM Plex Mono',monospace;
  }
  html[data-theme="light"]{
    --bg:#f4f3f1;
    --surface:#ffffff;
    --surface2:#eeece8;
    --surface3:#e3e0da;
    --accent:#d65a0f;
    --accent-dim:#fbe3d2;
    --amber:#b9740f;
    --text:#1f2226;
    --text-dim:#5d646d;
    --text-faint:#8a9099;
    --success:#2f8a52;
    --danger:#c9343a;
    --border:#dcd9d3;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:var(--font-body);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
    transition:background .2s,color .2s;
  }
  ::selection{background:var(--accent);color:#fff;}

  /* ===== Layout ===== */
  .app{display:grid;grid-template-columns:230px 1fr;min-height:100vh;}
  @media (max-width:860px){.app{grid-template-columns:1fr;}}

  /* ===== Sidebar ===== */
  .sidebar{
    background:var(--surface);
    border-right:1px solid var(--border);
    padding:24px 16px;
    display:flex;flex-direction:column;
    position:sticky;top:0;height:100vh;
  }
  @media (max-width:860px){.sidebar{position:relative;height:auto;flex-direction:row;align-items:center;overflow-x:auto;padding:14px 16px;gap:8px;}}
  .brand{
    font-family:var(--font-display);
    font-size:20px;font-weight:700;letter-spacing:0.5px;
    color:var(--text);margin-bottom:4px;
    display:flex;align-items:center;gap:10px;
  }
  .brand .mark{
    width:30px;height:30px;flex:none;
  }
  .brand-sub{
    font-family:var(--font-mono);
    font-size:10px;color:var(--text-faint);
    letter-spacing:1.5px;text-transform:uppercase;
    margin-bottom:28px;
  }
  @media (max-width:860px){.brand-sub{display:none;} .brand{margin-bottom:0;margin-right:10px;}}
  .nav{display:flex;flex-direction:column;gap:2px;}
  @media (max-width:860px){.nav{flex-direction:row;}}
  .nav button{
    all:unset;cursor:pointer;
    display:flex;align-items:center;gap:10px;
    padding:10px 12px;border-radius:6px;
    font-family:var(--font-body);font-size:13.5px;font-weight:600;
    color:var(--text-dim);white-space:nowrap;
    transition:background .15s,color .15s;
  }
  .nav button:hover{background:var(--surface2);color:var(--text);}
  .nav button.active{background:var(--accent-dim);color:var(--amber);}
  .nav button .dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex:none;}
  .sidebar-foot{margin-top:auto;font-family:var(--font-mono);font-size:10px;color:var(--text-faint);line-height:1.6;}
  @media (max-width:860px){.sidebar-foot{display:none;}}

  /* ===== Main ===== */
  .main{padding:28px 36px 60px;max-width:1300px;}
  @media (max-width:600px){.main{padding:18px 16px 40px;}}
  .page-head{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:14px;margin-bottom:26px;}
  .page-title{font-family:var(--font-display);font-size:30px;font-weight:600;letter-spacing:0.3px;}
  .page-desc{color:var(--text-dim);font-size:13.5px;margin-top:4px;}

  .btn{
    all:unset;cursor:pointer;
    font-family:var(--font-body);font-weight:600;font-size:13px;
    padding:10px 18px;border-radius:6px;
    background:var(--accent);color:#fff;
    transition:filter .15s, transform .1s;
  }
  .btn:hover{filter:brightness(1.12);}
  .btn:active{transform:scale(0.97);}
  .btn.secondary{background:var(--surface3);color:var(--text);}
  .btn.danger{background:transparent;color:var(--danger);border:1px solid var(--danger);}
  .btn.small{padding:6px 12px;font-size:12px;}

  /* ===== Stat cards ===== */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:32px;}
  @media (max-width:860px){.stats{grid-template-columns:repeat(2,1fr);}}
  @media (max-width:480px){.stats{grid-template-columns:1fr;}}
  .stat{
    background:var(--surface);border:1px solid var(--border);
    border-radius:10px;padding:18px 18px 16px;
    position:relative;overflow:hidden;
  }
  .stat::before{
    content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--bar);
  }
  .stat .label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text-faint);font-weight:600;}
  .stat .value{font-family:var(--font-display);font-size:30px;margin-top:6px;font-weight:600;}
  .stat .sub{font-size:11.5px;color:var(--text-dim);margin-top:4px;font-family:var(--font-mono);}

  /* ===== Sections / cards ===== */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:22px;margin-bottom:24px;}
  .card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
  .card-title{font-family:var(--font-display);font-size:17px;font-weight:600;letter-spacing:0.3px;}
  .card-title .count{color:var(--text-faint);font-family:var(--font-mono);font-size:12px;margin-left:8px;}

  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{
    text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:0.8px;
    color:var(--text-faint);font-weight:600;padding:8px 10px;border-bottom:1px solid var(--border);
  }
  td{padding:10px 10px;border-bottom:1px solid var(--surface2);font-family:var(--font-mono);font-size:12.5px;vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:var(--surface2);}
  td.name{font-family:var(--font-body);font-weight:500;}

  .pill{
    display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;
    font-family:var(--font-body);letter-spacing:0.2px;
  }
  .pill.ok{background:rgba(95,184,120,.15);color:var(--success);}
  .pill.low{background:rgba(245,166,35,.15);color:var(--amber);}
  .pill.crit{background:rgba(229,72,77,.15);color:var(--danger);}
  .pill.pending{background:rgba(245,166,35,.15);color:var(--amber);}
  .pill.fulfilled{background:rgba(95,184,120,.15);color:var(--success);}
  .pill.partial{background:rgba(232,89,12,.15);color:var(--accent);}

  /* stock gauge bars - signature element */
  .gauge-wrap{display:flex;align-items:center;gap:8px;}
  .gauge{width:80px;height:8px;background:var(--surface3);border-radius:4px;overflow:hidden;flex:none;}
  .gauge-fill{height:100%;border-radius:4px;}
  .gauge-pct{font-family:var(--font-mono);font-size:11px;color:var(--text-dim);width:34px;}

  /* rebar stack visual for dashboard */
  .rebar-yard{display:flex;align-items:flex-end;gap:14px;height:160px;padding:10px 6px 0;overflow-x:auto;}
  .rebar-col{display:flex;flex-direction:column;align-items:center;gap:8px;min-width:46px;flex:none;}
  .rebar-stack{display:flex;flex-direction:column-reverse;gap:3px;align-items:center;height:120px;justify-content:flex-start;}
  .rebar-rod{border-radius:3px;background:linear-gradient(90deg,#8a5a2e,#c98a44 50%,#8a5a2e);box-shadow:inset 0 1px 1px rgba(255,255,255,.25);}
  .rebar-label{font-family:var(--font-mono);font-size:11px;color:var(--text-dim);}
  .rebar-qty{font-family:var(--font-mono);font-size:10px;color:var(--text-faint);}

  /* form */
  .form-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
  @media (max-width:760px){.form-grid{grid-template-columns:repeat(2,1fr);}}
  @media (max-width:460px){.form-grid{grid-template-columns:1fr;}}
  label{font-size:11px;color:var(--text-faint);font-weight:600;text-transform:uppercase;letter-spacing:0.6px;display:block;margin-bottom:5px;}
  input,select{
    width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);
    padding:9px 10px;border-radius:6px;font-family:var(--font-mono);font-size:12.5px;
  }
  input:focus,select:focus{outline:none;border-color:var(--accent);}
  .field{margin-bottom:0;}

  .empty{padding:30px;text-align:center;color:var(--text-faint);font-size:13px;}
  .empty b{color:var(--text-dim);}

  .upload-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
  .dropzone{
    flex:1;min-width:240px;
    border:1.5px dashed var(--border);border-radius:8px;
    padding:18px 16px;text-align:center;cursor:pointer;
    transition:border-color .15s, background .15s;
    font-size:12.5px;color:var(--text-dim);
  }
  .dropzone:hover, .dropzone.drag{border-color:var(--accent);background:rgba(232,89,12,.06);}
  .dropzone b{color:var(--text);}
  .dropzone .sub{font-family:var(--font-mono);font-size:11px;color:var(--text-faint);margin-top:4px;}
  .upload-summary{font-family:var(--font-mono);font-size:12px;color:var(--text-dim);margin-top:12px;line-height:1.7;}
  .upload-summary .new{color:var(--success);}
  .upload-summary .upd{color:var(--amber);}
  .upload-summary .err{color:var(--danger);}

  .toast{
    position:fixed;bottom:24px;right:24px;background:var(--surface3);border:1px solid var(--border);
    border-left:3px solid var(--accent);padding:14px 18px;border-radius:8px;font-size:13px;
    max-width:320px;box-shadow:0 8px 24px rgba(0,0,0,.4);
    animation:slidein .25s ease, fadeout .4s ease 2.6s forwards;
    z-index:999;
  }
  @keyframes slidein{from{transform:translateX(30px);opacity:0;}to{transform:translateX(0);opacity:1;}}
  @keyframes fadeout{to{opacity:0;transform:translateY(6px);}}

  .section-note{font-size:12px;color:var(--text-faint);margin-top:10px;font-family:var(--font-mono);}

  ::-webkit-scrollbar{height:8px;width:8px;}
  ::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:4px;}

  .radio-opt{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--text-dim);font-weight:500;text-transform:none;letter-spacing:0;cursor:pointer;}
  .radio-opt input{width:auto;accent-color:var(--accent);cursor:pointer;}
  .reset-link{color:var(--text-faint);text-decoration:underline;margin-top:4px;display:inline-block;}
  .reset-link:hover{color:var(--danger);}

  .theme-toggle{
    all:unset;cursor:pointer;
    display:flex;align-items:center;gap:8px;
    margin-top:14px;padding:8px 12px;border-radius:6px;
    border:1px solid var(--border);background:var(--surface2);
    color:var(--text-dim);font-family:var(--font-body);font-weight:600;font-size:12px;
    transition:background .15s,color .15s;
  }
  .theme-toggle:hover{background:var(--surface3);color:var(--text);}
  @media (max-width:860px){.theme-toggle{margin-top:0;}}

  /* ===== Login ===== */
  .login-screen{
    position:fixed;inset:0;z-index:1000;
    display:flex;align-items:center;justify-content:center;padding:24px;
    background:
      radial-gradient(circle at 12% 18%, rgba(232,89,12,.10), transparent 42%),
      radial-gradient(circle at 88% 82%, rgba(245,166,35,.07), transparent 40%),
      var(--bg);
  }
  .login-card{
    width:100%;max-width:380px;
    background:var(--surface);border:1px solid var(--border);border-radius:12px;
    box-shadow:0 24px 60px rgba(0,0,0,.5);overflow:hidden;
  }
  .login-rods{display:flex;gap:3px;height:9px;}
  .login-rods div{flex:1;background:linear-gradient(90deg,#8a5a2e,#c98a44 50%,#8a5a2e);}
  .login-body{padding:34px 30px 30px;}
  .login-brand{display:flex;align-items:center;gap:10px;margin-bottom:18px;}
  .login-brand svg{flex:none;}
  .login-brand-text{font-family:var(--font-display);font-size:18px;font-weight:700;letter-spacing:0.3px;color:var(--text);line-height:1.25;}
  .login-eyebrow{
    font-family:var(--font-mono);font-size:10.5px;color:var(--text-faint);
    letter-spacing:1.4px;text-transform:uppercase;
    margin-bottom:26px;padding-bottom:20px;border-bottom:1px solid var(--border);
  }
  .login-field{margin-bottom:16px;}
  .login-error{
    font-family:var(--font-mono);font-size:11.5px;color:var(--danger);
    min-height:16px;margin:-4px 0 16px;
  }
  .login-submit{width:100%;display:block;text-align:center;box-sizing:border-box;}
  .login-foot{
    font-family:var(--font-mono);font-size:10.5px;color:var(--text-faint);
    text-align:center;margin-top:20px;letter-spacing:0.3px;
  }

  /* ===== Modal ===== */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(0,0,0,.55);
    display:none;align-items:center;justify-content:center;
    z-index:1000;padding:20px;
  }
  .modal-overlay.open{display:flex;}
  .modal{
    background:var(--surface);border:1px solid var(--border);border-radius:10px;
    padding:24px;max-width:560px;width:100%;max-height:85vh;overflow-y:auto;
    box-shadow:0 16px 48px rgba(0,0,0,.45);
  }
  .modal-title{font-family:var(--font-display);font-size:18px;font-weight:600;margin-bottom:18px;letter-spacing:0.3px;}
  .modal-actions{display:flex;gap:10px;margin-top:18px;justify-content:flex-end;}
  .modal table{margin-bottom:4px;}
  .modal td, .modal th{padding:7px 8px;}
  .btn.tiny{padding:4px 9px;font-size:11px;}
  .priority-badge{
    display:inline-flex;align-items:center;justify-content:center;
    min-width:22px;height:22px;border-radius:5px;
    background:var(--surface3);color:var(--text);font-family:var(--font-mono);
    font-size:11px;font-weight:600;
  }
  .priority-badge.muted{background:transparent;color:var(--text-faint);}
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <svg class="mark" viewBox="0 0 30 30"><rect x="2" y="13" width="26" height="4" rx="2" fill="#e8590c"/><circle cx="6" cy="15" r="4.5" fill="#f5a623"/><circle cx="24" cy="15" r="4.5" fill="#f5a623"/></svg>
      JINDAL STAINLESS LIMITED
    </div>
    <div class="brand-sub">Inventory · Orders · Mill Plan</div>
    <nav class="nav" id="nav"></nav>
    <button class="theme-toggle" id="themeToggle" type="button"></button>
    <div class="sidebar-foot">
      Stock unit: Metric Tons (MT)<br>
      Grades: SS-500 / SS-600 / SS-550<br>
      <span id="dbStatus">Connecting to database…</span>
      <div><a href="#" id="resetDataLink" class="reset-link">Clear all data</a></div>
      <div><a href="#" id="logoutLink" class="reset-link">Log out</a></div>
    </div>
  </aside>

  <main class="main" id="main"></main>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalBox"></div>
</div>

<div id="loginScreen" class="login-screen">
  <div class="login-card">
    <div class="login-rods">
      <div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div>
    </div>
    <form id="loginForm" class="login-body">
      <div class="login-brand">
        <svg width="28" height="28" viewBox="0 0 30 30"><rect x="2" y="13" width="26" height="4" rx="2" fill="#e8590c"/><circle cx="6" cy="15" r="4.5" fill="#f5a623"/><circle cx="24" cy="15" r="4.5" fill="#f5a623"/></svg>
        <div class="login-brand-text">JINDAL STAINLESS LIMITED</div>
      </div>
      <div class="login-eyebrow">Inventory &amp; Order Control — Sign In</div>

      <div class="field login-field">
        <label for="loginUser">Username</label>
        <input id="loginUser" type="text" autocomplete="username" placeholder="Enter username">
      </div>
      <div class="field login-field">
        <label for="loginPass">Password</label>
        <input id="loginPass" type="password" autocomplete="current-password" placeholder="Enter password">
      </div>

      <div class="login-error" id="loginError"></div>

      <button type="submit" class="btn login-submit">Sign In</button>
      <div class="login-foot">Authorized personnel only</div>
    </form>
  </div>
</div>

<div id="loadingOverlay" style="position:fixed;inset:0;background:var(--bg);display:none;align-items:center;justify-content:center;z-index:999;font-family:var(--font-mono);color:var(--text-dim);font-size:13px;">
  Loading inventory data…
</div>

/* ============== PRIORITY ============== */
function ensureOrderPriorities(){
  // backfill a priority number (lower = served first) for any order that doesn't have one yet
  let next = orders.reduce((m,o)=> typeof o.priority==='number' ? Math.max(m,o.priority) : m, 0) + 1;
  orders.forEach(o=>{
    if(typeof o.priority!=='number'){ o.priority = next; next++; }
  });
}
function moveOrderPriority(id, dir){
  const sorted = [...orders].sort((a,b)=> (a.priority||0) - (b.priority||0));
  const idx = sorted.findIndex(o=>o.id===id);
  if(idx<0) return;
  const swapIdx = idx + dir;
  if(swapIdx<0 || swapIdx>=sorted.length) return;
  const a = sorted[idx], b = sorted[swapIdx];
  const tmp = a.priority; a.priority = b.priority; b.priority = tmp;
  // priority just changed rank, so immediately reclaim and re-hand-out stock
  // strictly by the new order — a line can drop from fulfilled to partial
  // here if it just got outranked
  const changed = reallocateAllByPriority();
  if(changed>0) toast(`Priority updated — ${changed} order line(s) reallocated.`);
  render();
}

/* ============== PERSISTENCE (Supabase, with localStorage fallback) ============== */
function setDbStatus(text){
  const el = document.getElementById('dbStatus');
  if(el) el.textContent = text;
}

// Local cache is only used as an offline fallback if Supabase isn't configured or a request fails.
function loadLocalCache(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return null;
    const parsed = JSON.parse(raw);
    if(!parsed || !Array.isArray(parsed.stock) || !Array.isArray(parsed.orders)) return null;
    if(!Array.isArray(parsed.customers)) parsed.customers = JSON.parse(JSON.stringify(DEFAULT_CUSTOMERS));
    return parsed;
  }catch(err){ return null; }
}
function saveLocalCache(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify({stock, orders, orderSeq, billing, billingSeq, customers})); }catch(err){}
}

// Loads the full state once, at startup, from Supabase.
async function loadData(){
  if(!supabaseConfigured){
    setDbStatus('⚠ Supabase not configured — using this browser only');
    return loadLocalCache();
  }
  try{
    const [{data: stockRows, error: stockErr}, {data: orderRows, error: orderErr}, {data: metaRows, error: metaErr}] = await Promise.all([
      sb.from('stock').select('*'),
      sb.from('orders').select('*'),
      sb.from('app_meta').select('*').in('key',['orderSeq','billing','billingSeq','customers'])
    ]);
    if(stockErr) throw stockErr;
    if(orderErr) throw orderErr;
    if(metaErr) throw metaErr;

    const loadedStock = (stockRows||[]).map(r=>({dia:r.dia, grade:r.grade, qty:Number(r.qty), reorder:Number(r.reorder), capacity:Number(r.capacity)}));
    const loadedOrders = (orderRows||[]).map(r=>({id:r.id, customer:r.customer, date:r.date, priority:r.priority, items:r.items||[]}))
      .sort((a,b)=>(a.priority||0)-(b.priority||0));

    const metaMap = {};
    (metaRows||[]).forEach(r=>{ metaMap[r.key] = r.value; });
    const loadedSeq = metaMap.orderSeq!==undefined ? Number(metaMap.orderSeq) : DEFAULT_ORDER_SEQ;
    let loadedBilling = DEFAULT_BILLING;
    try{ loadedBilling = metaMap.billing ? (typeof metaMap.billing==='string' ? JSON.parse(metaMap.billing) : metaMap.billing) : DEFAULT_BILLING; }catch(e){ loadedBilling = DEFAULT_BILLING; }
    const loadedBillingSeq = metaMap.billingSeq!==undefined ? Number(metaMap.billingSeq) : DEFAULT_BILLING_SEQ;
    let loadedCustomers = DEFAULT_CUSTOMERS;
    try{ loadedCustomers = metaMap.customers ? (typeof metaMap.customers==='string' ? JSON.parse(metaMap.customers) : metaMap.customers) : DEFAULT_CUSTOMERS; }catch(e){ loadedCustomers = DEFAULT_CUSTOMERS; }

    setDbStatus('● Connected to Supabase');
    return {stock: loadedStock, orders: loadedOrders, orderSeq: loadedSeq, billing: loadedBilling, billingSeq: loadedBillingSeq, customers: loadedCustomers};
  }catch(err){
    const msg = (err && (err.message || err.error_description || err.hint)) || JSON.stringify(err);
    console.error('Could not load data from Supabase:', msg, err);
    setDbStatus('⚠ Supabase error — using this browser only');
    toast('Supabase load error: ' + msg);
    return loadLocalCache();
  }
}

// Full-state save: mirrors the in-memory arrays into Supabase (delete-then-insert keeps it simple and correct).
async function saveData(){
  saveLocalCache(); // always keep an offline fallback copy
  if(!supabaseConfigured) return;
  try{
    const stockRows = stock.map(s=>({dia:s.dia, grade:s.grade, qty:s.qty, reorder:s.reorder, capacity:s.capacity}));
    const orderRows = orders.map(o=>({id:o.id, customer:o.customer, date:o.date, priority:o.priority, items:o.items}));

    await sb.from('stock').delete().not('dia','is', null);
    if(stockRows.length) { const {error} = await sb.from('stock').insert(stockRows); if(error) throw error; }

    await sb.from('orders').delete().not('id','is', null);
    if(orderRows.length) { const {error} = await sb.from('orders').insert(orderRows); if(error) throw error; }

    const {error: metaError} = await sb.from('app_meta').upsert([
      {key:'orderSeq', value: orderSeq},
      {key:'billing', value: JSON.stringify(billing)},
      {key:'billingSeq', value: billingSeq},
      {key:'customers', value: JSON.stringify(customers)}
    ]);
    if(metaError) throw metaError;

    setDbStatus('● Synced to Supabase');
  }catch(err){
    const msg = (err && (err.message || err.error_description || err.hint)) || JSON.stringify(err);
    console.error('Could not save data to Supabase:', msg, err);
    setDbStatus('⚠ Save failed — check Supabase config');
    toast('Supabase save error: ' + msg);
  }
}

    </div>
  `;
  document.getElementById('restrictedCancelBtn').addEventListener('click', ()=>{ pendingRestrictedAction=null; closeModal(); });
  document.getElementById('restrictedSubmitBtn').addEventListener('click', submitRestrictedPassword);

  const val = document.getElementById('restrictedPassInput').value;
  if(val === RESTRICTED_PASS){
    sessionStorage.setItem(RESTRICTED_SESSION_KEY, 'true');
    closeModal();
    const action = pendingRestrictedAction;
    pendingRestrictedAction = null;
    if(action) action();
  } else {
    document.getElementById('restrictedPassError').textContent = 'Incorrect password.';
  }
}

function manufacturingNeeds(){
  return stock
    .map(s=>({...s, deficit: Math.max(0, s.reorder - s.qty)}))
    .filter(s=>s.deficit > 0)
    .sort((a,b)=>b.deficit - a.deficit);
}
function pendingDemandFor(dia,grade){
  let total = 0;
  orders.forEach(o=> o.items.forEach(it=>{
    if(it.dia===dia && it.grade===grade && it.status!=='fulfilled') total += (it.qty - (it.allocated||0));
  }));
  return total;
}
function orderStatus(o){
  const statuses = o.items.map(it=>it.status);
  if(statuses.every(s=>s==='fulfilled')) return 'fulfilled';
  if(statuses.every(s=>s==='pending')) return 'pending';
  return 'partial';
}
function orderTotalQty(o){ return o.items.reduce((a,it)=>a+it.qty,0); }

    </button>`).join('');
  nav.querySelectorAll('button').forEach(b=>{
    b.addEventListener('click', ()=>{
      const tab = b.dataset.tab;
      if(PASSWORD_PROTECTED_TABS.includes(tab) && !isRestrictedUnlocked()){
        requireRestrictedAccess(()=>{ activeTab=tab; render(); });
      } else {
        activeTab=tab; render();
      }
    });
  });
}

/* ============== RENDER: DASHBOARD ============== */
function renderDashboard(){
  const totalStock = stock.reduce((a,s)=>a+s.qty,0);
  const totalCapacity = stock.reduce((a,s)=>a+s.capacity,0);
  const avgFillPct = totalCapacity>0 ? Math.round((totalStock/totalCapacity)*100) : 0;
  const lowCount = stock.filter(s=>stockStatus(s)==='low').length;
  const critCount = stock.filter(s=>stockStatus(s)==='crit').length;
  const okCount = stock.filter(s=>stockStatus(s)==='ok').length;
  const pendingOrders = orders.filter(o=>orderStatus(o)==='pending').length;
  const partialOrders = orders.filter(o=>orderStatus(o)==='partial').length;
  const fulfilledOrders = orders.filter(o=>orderStatus(o)==='fulfilled').length;
  const mfgNeeds = manufacturingNeeds();
  const totalDeficit = mfgNeeds.reduce((a,s)=>a+s.deficit,0);
  const activeCustomers = new Set(orders.map(o=>o.customer)).size;
  const totalOrderQty = orders.reduce((a,o)=>a+orderTotalQty(o),0);
  const totalOpenDemand = orders.reduce((a,o)=>a+o.items.filter(it=>it.status!=='fulfilled').reduce((s,it)=>s+(it.qty-(it.allocated||0)),0),0);

  const byDia = DIAMETERS.map(d=>{
    const rows = stock.filter(s=>s.dia===d);
    if(rows.length===0) return {dia:d, total:0, cap:0, empty:true, status:'empty'};
    const total = rows.reduce((a,s)=>a+s.qty,0);
    const cap = rows.reduce((a,s)=>a+s.capacity,0);
    return {dia:d, total, cap, empty:false, status: rows.some(r=>stockStatus(r)!=='ok') ? (rows.some(r=>stockStatus(r)==='crit')?'crit':'low') : 'ok'};
  });

  const byGrade = GRADES.map(g=>{
    const rows = stock.filter(s=>s.grade===g);
    const qty = rows.reduce((a,s)=>a+s.qty,0);
    const cap = rows.reduce((a,s)=>a+s.capacity,0);
    const pct = totalStock>0 ? Math.round((qty/totalStock)*100) : 0;
    return {grade:g, qty, cap, pct, lines: rows.length};
  });

  const statusColor = {ok:'var(--success)', low:'var(--amber)', crit:'var(--danger)', empty:'var(--text-faint)'};

  const criticalLines = stock.filter(s=>stockStatus(s)==='crit').sort((a,b)=>a.qty-b.qty);
  const lowLines = stock.filter(s=>stockStatus(s)==='low').sort((a,b)=>(a.qty/a.reorder)-(b.qty/b.reorder));

  const customerTotals = {};

    if(!customerTotals[o.customer]) customerTotals[o.customer] = {customer:o.customer, orderCount:0, totalQty:0, openQty:0};
    customerTotals[o.customer].orderCount++;
    customerTotals[o.customer].totalQty += orderTotalQty(o);
    customerTotals[o.customer].openQty += o.items.filter(it=>it.status!=='fulfilled').reduce((s,it)=>s+(it.qty-(it.allocated||0)),0);
  });
  const topCustomers = Object.values(customerTotals).sort((a,b)=>b.totalQty-a.totalQty).slice(0,6);

  const recentOrders = [...orders].sort((a,b)=> b.date.localeCompare(a.date) || b.id.localeCompare(a.id)).slice(0,6);

  const totalBilledQty = billing.reduce((a,b)=>a+b.qty,0);
  const billingDocs = new Set(billing.map(b=>b.docNumber).filter(Boolean)).size;
  const billedCustomers = new Set(billing.map(b=>b.customer)).size;
  const billedOrdersCount = new Set(billing.map(b=>b.orderId)).size;

  const billedThisMonth = billing.filter(b=>b.billDate.startsWith(thisMonthPrefix)).reduce((a,b)=>a+b.qty,0);

  const billingCustomerTotals = {};

/* ============== PDF EXPORT ============== */
async function downloadDashboardPDF(){
  const btn = document.getElementById('downloadDashboardPdfBtn');
  const main = document.getElementById('main');
  if(!main || typeof html2canvas==='undefined' || !window.jspdf){
    toast('PDF export library failed to load — check your connection and try again.');
    return;
  }
  if(btn){ btn.textContent = 'Generating PDF…'; btn.style.pointerEvents='none'; }
  try{
    const bg = getComputedStyle(document.documentElement).getPropertyValue('--bg').trim() || '#15171a';
    const canvas = await html2canvas(main, {backgroundColor: bg, scale: 2, useCORS: true});
    const imgData = canvas.toDataURL('image/png');
    const { jsPDF } = window.jspdf;
    const pageWidth = 842; // A4 landscape-ish pt width, content scaled to fit
    const pageHeight = Math.round(pageWidth * (canvas.height/canvas.width));
    const pdf = new jsPDF({orientation:'p', unit:'pt', format:[pageWidth, pageHeight]});
    pdf.addImage(imgData, 'PNG', 0, 0, pageWidth, pageHeight);
    const stamp = new Date().toISOString().slice(0,10);
    pdf.save(`rebar-dashboard-${stamp}.pdf`);
    toast('Dashboard PDF downloaded.');
  }catch(err){
    console.error('PDF export failed:', err);
    toast('Could not generate the PDF. Please try again.');
  }finally{
    if(btn){ btn.textContent = '⬇ Download PDF'; btn.style.pointerEvents=''; }
  }
}

function moveCartLine(i, dir){
  const j = i+dir;
  if(j<0 || j>=orderCart.length) return;
  [orderCart[i], orderCart[j]] = [orderCart[j], orderCart[i]];
  renderOrders();
}

function addOrderLine(){
  const dia = Number(document.getElementById('f-dia').value);
  const grade = document.getElementById('f-grade').value;
  const qty = Number(document.getElementById('f-qty').value);
  if(!qty || qty<=0){ toast('Enter a valid quantity before adding a line.'); return; }
  orderCart.push({dia, grade, qty});
  document.getElementById('f-qty').value = '';
  renderOrders();
}

function fulfillItem(item){
  const s = findStock(item.dia, item.grade);
  if(!item.allocated) item.allocated = 0;
  const remaining = item.qty - item.allocated;
  if(remaining<=0){ item.status='fulfilled'; return false; }
  if(!s || s.qty<=0) return false;
  const take = Math.min(s.qty, remaining);
  s.qty -= take;
  item.allocated += take;
  item.status = item.allocated >= item.qty ? 'fulfilled' : (item.allocated>0 ? 'partial' : 'pending');
  return take>0;
}

/* ============== GLOBAL PRIORITY-BASED FULFILLMENT ==============
   Strict priority reallocation: every unit of stock currently allocated to
   any order line is first handed back to inventory, then the full queue —
   every order/item, sorted by order priority first (lower number = served
   first), then by each item's position within its order — is walked from
   scratch and stock is handed out again in that order.
   This means priority #1 always wins, even over stock a lower-priority
   order was already holding: if priorities are reordered (or a new
   higher-priority order/edit appears), a previously "fulfilled" line can
   drop back to "partial" or "pending" as its stock is reclaimed and
   handed to the higher-priority line instead.
   EXCEPTION: lines with item.manual === true are pinned to whatever
   quantity was manually set for them (see saveManualAllocation) — they are
   skipped entirely by both the reclaim step and the redistribution queue,
   so automatic reallocation never overrides a deliberate manual call.
   PARAMETER ignoreManual: when true, that exception is switched off — every
   manual pin is cleared (item.manual set back to false) and every line,
   pinned or not, is reclaimed and re-competed for strictly by priority.
   This is used by "⚡ Fulfill All by Priority" specifically, since that
   button's whole purpose is to show what priority order alone would
   produce, ignoring any manual overrides made along the way. Other callers
   (placing an order, reordering priority, receiving stock, editing an
   order) still pass no argument and continue to respect manual pins. */
function reallocateAllByPriority(ignoreManual){
  // snapshot current allocation/status/pin state of every line so we can report what changed
  const before = [];
  orders.forEach(o=>{
    o.items.forEach(it=>{ before.push({allocated: it.allocated||0, status: it.status, manual: !!it.manual}); });
  });

  // Step 1: reclaim every allocated unit back into inventory. Manually
  // pinned lines are left alone UNLESS ignoreManual is true, in which case
  // their pin is cleared too and they're reclaimed like everything else.
  orders.forEach(o=>{
    o.items.forEach(it=>{
      if(it.manual && !ignoreManual) return;
      if(ignoreManual) it.manual = false;
      const allocated = it.allocated||0;
      if(allocated>0){
        const s = findStock(it.dia, it.grade);
        if(s) s.qty += allocated;
      }
      it.allocated = 0;
      it.status = 'pending';
    });
  });

  // Step 2: hand stock back out from scratch, strictly by priority —
  // manual lines are skipped (unless ignoreManual cleared their pin above),
  // since otherwise they're pinned and don't compete
  const queue = [];
  [...orders].sort((a,b)=>(a.priority||0)-(b.priority||0)).forEach(o=>{
    o.items.forEach(it=>{ if(!it.manual) queue.push(it); });
  });
  queue.forEach(it=> fulfillItem(it));

  // count lines whose allocation, status, or pin state actually differ from before
  let changed = 0, i = 0;
  orders.forEach(o=>{
    o.items.forEach(it=>{
      const b = before[i++];
      if(b.allocated !== (it.allocated||0) || b.status !== it.status || b.manual !== !!it.manual) changed++;
    });
  });
  return changed;
}

/* ============== MANUAL PER-LINE ALLOCATION OVERRIDE ==============
   Lets a user pin an exact allocated quantity on any single order line —
   e.g. "priority 1 only actually gets 10 of its 20MT" — overriding what the
   automatic priority engine would otherwise hand it. Once pinned
   (item.manual = true), reallocateAllByPriority leaves that line alone on
   every future run; any stock freed up by a manual reduction is immediately
   re-offered to the rest of the priority queue. "Reset to Auto" un-pins the
   line and lets it compete normally again. */
function openAdjustAllocationModal(orderId, itemIdx){
  const o = orders.find(x=>x.id===orderId);
  if(!o) return;
  const it = o.items[itemIdx];
  if(!it) return;
  const s = findStock(it.dia, it.grade);
  const stockAvailable = s ? s.qty : 0;
  const maxAllocatable = Math.min(it.qty, stockAvailable + (it.allocated||0));

  const box = document.getElementById('modalBox');
  box.innerHTML = `
    <div class="modal-title">Adjust Allocation — ${o.id}</div>
    <div class="section-note" style="margin-bottom:14px;">⌀${it.dia}mm ${it.grade} · Ordered ${fmt(it.qty)} MT · Currently allocated ${fmt(it.allocated||0)} MT${it.manual ? ' — <b style="color:var(--amber)">manually pinned</b>' : ' — auto-allocated by priority'}</div>
    <div class="field" style="max-width:260px;">
      <label>Allocate exactly (MT) — max ${fmt(maxAllocatable)}</label>
      <input id="adj-qty" type="number" min="0" max="${maxAllocatable}" step="0.1" value="${fmt(it.allocated||0)}">
    </div>
    <div class="section-note" style="margin-top:12px;">Saving pins this line at the exact amount you enter — the automatic priority engine will skip it going forward, even if priorities change or other orders are placed. Any stock this frees up is immediately re-offered to the rest of the queue. Use "Reset to Auto" to hand it back to automatic allocation.</div>
    <div class="modal-actions">
      <button class="btn secondary" id="modalCancelBtn">Cancel</button>
      ${it.manual ? `<button class="btn secondary" id="modalResetBtn">Reset to Auto</button>` : ''}
      <button class="btn" id="modalSaveBtn">Save Allocation</button>
    </div>
  `;
  document.getElementById('modalCancelBtn').addEventListener('click', closeModal);
  document.getElementById('modalSaveBtn').addEventListener('click', ()=>saveManualAllocation(orderId, itemIdx));
  const resetBtn = document.getElementById('modalResetBtn');
  if(resetBtn) resetBtn.addEventListener('click', ()=>resetManualAllocation(orderId, itemIdx));
  showModal();
}

function saveManualAllocation(orderId, itemIdx){
  const o = orders.find(x=>x.id===orderId);
  if(!o) return;
  const it = o.items[itemIdx];
  if(!it) return;
  const newQty = Number(document.getElementById('adj-qty').value);
  if(isNaN(newQty) || newQty<0){ toast('Enter a valid quantity.'); return; }
  if(newQty > it.qty + 1e-9){ toast(`Cannot allocate more than the ${fmt(it.qty)} MT ordered on this line.`); return; }

  const s = findStock(it.dia, it.grade);
  const stockAvailable = (s ? s.qty : 0) + (it.allocated||0);
  if(newQty > stockAvailable + 1e-9){
    toast(`Only ${fmt(stockAvailable)} MT of ⌀${it.dia}mm ${it.grade} is available for this line.`);
    return;
  }
  if(!s && newQty>0){ toast(`No stock line exists for ⌀${it.dia}mm ${it.grade}.`); return; }

  // return whatever this line currently holds, then take the new manual amount
  if(s){
    s.qty += (it.allocated||0);
    s.qty -= newQty;
  }
  it.allocated = newQty;
  it.status = newQty >= it.qty ? 'fulfilled' : (newQty>0 ? 'partial' : 'pending');
  it.manual = true;

  // re-run the auto engine so any stock this freed up is immediately
  // re-offered to the rest of the priority queue (this pinned line is skipped)
  reallocateAllByPriority();
  closeModal();
  toast(`${o.id}: ⌀${it.dia}mm ${it.grade} line manually set to ${fmt(newQty)} MT and pinned.`);
  render();
}

function resetManualAllocation(orderId, itemIdx){
  const o = orders.find(x=>x.id===orderId);
  if(!o) return;
  const it = o.items[itemIdx];
  if(!it) return;
  const s = findStock(it.dia, it.grade);
  if(s) s.qty += (it.allocated||0);
  it.allocated = 0;
  it.status = 'pending';
  it.manual = false;
  reallocateAllByPriority();
  closeModal();
  toast(`${o.id}: ⌀${it.dia}mm ${it.grade} line returned to automatic priority allocation.`);
  render();
}

function placeOrder(){
  const customer = document.getElementById('f-customer').value.trim();
  if(!customer){ toast('Enter a customer name.'); return; }
  if(orderCart.length===0){ toast('Add at least one order line.'); return; }

  const id = 'ORD-'+(orderSeq++);
  const items = orderCart.map(l=>({dia:l.dia, grade:l.grade, qty:l.qty, allocated:0, status:'pending'}));
  const order = {id, customer, date: new Date().toISOString().slice(0,10), items};
  orders.push(order);
  ensureOrderPriorities();

  // re-run the full priority queue (not just this order's items) so a newly
  // placed order competes fairly by priority — it can even reclaim stock
  // already sitting with a lower-priority order if it outranks it
  reallocateAllByPriority();

  orderCart = [];
  const st = orderStatus(order);
  toast(`${id} placed (${items.length} line${items.length===1?'':'s'}) — ${st==='fulfilled'?'fully fulfilled':st==='partial'?'partially fulfilled':'pending, insufficient stock'}.`);
  render();
}

function tryFulfillOrder(id){
  const o = orders.find(x=>x.id===id);
  if(!o) return;
  const before = o.items.map(it=>({allocated: it.allocated||0, status: it.status}));
  reallocateAllByPriority();
  let changed = 0;
  o.items.forEach((it,i)=>{ if(it.allocated!==before[i].allocated || it.status!==before[i].status) changed++; });
  if(changed>0){ toast(`${id}: ${changed} line(s) changed after re-running the full priority queue.`); }
  else { toast(`${id}: no change — stock is already allocated strictly by priority.`); }
  render();
}

function fulfillAllOrdersByPriority(){
  const hadManual = orders.some(o=>o.items.some(it=>it.manual));
  const changed = reallocateAllByPriority(true); // true = ignore/clear manual pins, pure priority order
  if(changed>0){ toast(`${changed} line(s) reallocated across all orders, strictly by priority.${hadManual ? ' Manual allocation pins were cleared.' : ''}`); }
  else { toast('No change — stock is already allocated strictly by priority.'); }
  render();
}

function deleteOrder(id){
  const o = orders.find(x=>x.id===id);
  if(!o) return;
  if(!confirm(`Delete order ${id} for ${o.customer}? Any allocated stock (fulfilled or partially fulfilled lines) will be returned to inventory.`)) return;
  o.items.forEach(it=>{
    const allocated = it.allocated||0;
    if(allocated>0){
      const s = findStock(it.dia, it.grade);
      if(s) s.qty += allocated;
    }
  });
  orders = orders.filter(x=>x.id!==id);
  toast(`${id} deleted and any allocated stock restored.`);
  render();
}

/* ============== BILLING ==============
   Moves the currently-fulfilled (allocated) quantity of an order's lines
   into the Billing record, and permanently reduces the order's remaining
   quantity by that billed amount. Unlike a delete, billed stock is NOT
   returned to the yard — it has left the yard for good. A line that is
   billed down to zero remaining quantity is dropped from the order, and
   an order left with no lines at all is considered fully billed and closed. */
function nextBillId(){ return 'BILL-'+(billingSeq++); }

function billOrder(id){
  const o = orders.find(x=>x.id===id);
  if(!o) return;
  const billable = o.items.filter(it=>(it.allocated||0)>0);
  if(billable.length===0){ toast(`${id}: nothing fulfilled yet — nothing to bill.`); return; }
  openBillDocumentModal(id);
}

      </div>

      </div>

        <label>S.O. Number</label>
        <input id="billSoNumber" placeholder="e.g. 0558182447">
      </div>

        <label>Vehicle Planning</label>
        <input id="billVehiclePlanning" value="As per plan">

        <input id="billGradation" placeholder="e.g. SS 550">
      </div>
    </div>
    <table style="margin-bottom:14px;">
      <thead><tr><th>Item</th><th>Width (Diameter)</th><th>Grade</th><th>Qty Billed</th></tr></thead>
      <tbody>${billable.map((it,i)=>`<tr><td>${i+1}</td><td>⌀${it.dia}mm</td><td>${it.grade}</td><td>${fmt(it.allocated||0)} MT</td></tr>`).join('')}</tbody>
    </table>

      <button class="btn" id="billDocConfirmBtn">Bill</button>
    </div>
  `;
  document.getElementById('billDocCancelBtn').addEventListener('click', closeModal);

    const c = findCustomer(e.target.value);
    document.getElementById('billShipToCity').value = c ? (c.city||'') : '';
  });
  const input = document.getElementById('billDocNumberInput');
  input.addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); confirmBillOrder(orderId); } });
  showModal();
  input.focus();
}

function confirmBillOrder(orderId){
  const err = document.getElementById('billDocError');
  const docNumber = (document.getElementById('billDocNumberInput')||{}).value?.trim() || '';
  const soldToCode = (document.getElementById('billSoldTo')||{}).value || '';
  const shipToCode = (document.getElementById('billShipTo')||{}).value || '';
  const soNumber = (document.getElementById('billSoNumber')||{}).value?.trim() || '';
  const vehiclePlanning = (document.getElementById('billVehiclePlanning')||{}).value?.trim() || 'As per plan';
  const length = (document.getElementById('billLength')||{}).value || '';
  const gradation = (document.getElementById('billGradation')||{}).value?.trim() || '';

  if(!docNumber){ if(err) err.textContent = 'Enter a billing document number.'; return; }
  if(!soldToCode){ if(err) err.textContent = 'Select a Sold To Party.'; return; }
  if(!shipToCode){ if(err) err.textContent = 'Select a Ship To Party.'; return; }
  if(!soNumber){ if(err) err.textContent = 'Enter the S.O. Number.'; return; }

  const soldTo = findCustomer(soldToCode);
  const shipTo = findCustomer(shipToCode);
  const o = orders.find(x=>x.id===orderId);
  if(!o){ closeModal(); return; }
  const billable = o.items.filter(it=>(it.allocated||0)>0);
  if(billable.length===0){ closeModal(); toast(`${orderId}: nothing fulfilled yet — nothing to bill.`); return; }
  const totalBillQty = billable.reduce((a,it)=>a+(it.allocated||0),0);

  const billDate = new Date().toISOString().slice(0,10);
  billable.forEach((it,idx)=>{
    const billedQty = it.allocated||0;
    billing.push({
      id: nextBillId(),
      docNumber,
      orderId: o.id,
      customer: o.customer,
      orderDate: o.date,
      billDate,
      dia: it.dia,
      grade: it.grade,
      qty: billedQty,
      soldToCode: soldTo ? soldTo.code : soldToCode,
      soldToName: soldTo ? soldTo.name : '',
      shipToCode: shipTo ? shipTo.code : shipToCode,
      shipToName: shipTo ? shipTo.name : '',
      shipToCity: shipTo ? (shipTo.city||'') : '',
      length,
      gradation,
      vehiclePlanning,
      soNumber,
      item: idx+1,
      totalQty: idx===0 ? totalBillQty : null,
      isFirstOfBatch: idx===0
    });
    it.qty = Math.max(0, it.qty - billedQty);
    it.allocated = 0;
    it.manual = false;
    it.status = 'pending';
  });

  // drop lines that have been billed down to nothing left to fulfil
  o.items = o.items.filter(it=>it.qty > 0.0001);

  closeModal();

  if(o.items.length===0){
    orders = orders.filter(x=>x.id!==o.id);
    toast(`${orderId} fully billed under document ${docNumber} and closed — ${fmt(totalBillQty)} MT moved to Billing.`);
  } else {
    toast(`${fmt(totalBillQty)} MT billed from ${orderId} under document ${docNumber} — remaining order quantity reduced accordingly.`);
  }
  render();
  downloadBillingExcelForDoc(docNumber);
}

function fmtMM(n){
  if(n===undefined || n===null || n==='') return '';
  return Number(n).toLocaleString('en-IN', {minimumFractionDigits:3, maximumFractionDigits:3}) + ' MM';
}
function fmtQty3(n){
  if(n===undefined || n===null || n==='') return '';
  return Number(n).toLocaleString('en-IN', {minimumFractionDigits:3, maximumFractionDigits:3});
}

// Groups billing rows into their original billing batches (same doc number + order + bill date),
// in the order they were created, so item numbering / first-row-only fields line up correctly.
function billingBatches(list){
  const byKey = new Map();
  const order = [];
  list.forEach(b=>{
    const key = b.docNumber+'::'+b.orderId+'::'+b.billDate;
    if(!byKey.has(key)){ byKey.set(key, []); order.push(key); }
    byKey.get(key).push(b);
  });
  return order.map(k=> byKey.get(k).sort((a,b)=>(a.item||0)-(b.item||0)) );
}

// Groups billing records purely by Billing Document Number, in first-seen order —
// this is the grouping used for "one bill doc number = one Excel file".
function billingDocGroups(list){
  const byDoc = new Map();
  const order = [];
  [...list].sort((a,b)=> a.billDate.localeCompare(b.billDate) || (a.item||0)-(b.item||0)).forEach(b=>{
    const key = b.docNumber || '(no doc number)';
    if(!byDoc.has(key)){ byDoc.set(key, []); order.push(key); }
    byDoc.get(key).push(b);
  });
  return order.map(docNumber=>({docNumber, rows: byDoc.get(docNumber)}));
}

const BILLING_EXCEL_COL_WIDTHS = [{wch:14},{wch:26},{wch:14},{wch:26},{wch:16},{wch:12},{wch:14},{wch:10},{wch:8},{wch:10},{wch:14},{wch:14},{wch:6},{wch:10}];

// Builds the SAP-style export rows for a list of billing records, batching by
// doc number + order + bill date so Gradation/Vehicle Planning/Total Qty only
// appear once per batch and Item numbers stay in sequence.
function buildBillingExportRows(list){
  const batches = billingBatches(list);
  const rows = [];
  batches.forEach(batch=>{
    batch.forEach((b,idx)=>{
      rows.push({
        'Sold to Party': b.soldToCode || '',
        'Sold to Party Name': b.soldToName || '',
        'Ship to Party': b.shipToCode || '',
        'Ship to Party Name': b.shipToName || '',
        'ship to Party City': b.shipToCity || '',
        'WIDTH': fmtMM(b.dia),
        'LENGTH': fmtMM(b.length),
        'Ord_Qty': fmtQty3(b.qty),
        'GRADE': b.grade || '',
        'Gradation': idx===0 ? (b.gradation||'') : '',
        'Vehicle planning': idx===0 ? (b.vehiclePlanning||'') : '',
        'S.O': b.soNumber || '',
        'Item': b.item || (idx+1),
        'Total Qty': idx===0 && b.totalQty ? `${fmt(b.totalQty)} MT` : '',
      });
    });
  });
  return rows;
}

function safeFileToken(s){
  return String(s).replace(/[^a-zA-Z0-9_.-]+/g,'_').replace(/^_+|_+$/g,'') || 'unnamed';
}

// One Excel workbook per Billing Document Number — this is the standard export.
function downloadBillingExcelForDoc(docNumber){
  const list = billing.filter(b=>(b.docNumber||'(no doc number)')===docNumber);
  if(list.length===0){ toast(`No billing lines found for document ${docNumber}.`); return; }
  const rows = buildBillingExportRows(list);
  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = BILLING_EXCEL_COL_WIDTHS;
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Billing');
  XLSX.writeFile(wb, `billing-${safeFileToken(docNumber)}.xlsx`);
  toast(`Document ${docNumber}: ${rows.length} line(s) exported to Excel.`);
}

// Combined export of everything in the Billing tab — still one row per line item,
// but spanning every document. Use the per-document buttons for a single doc's file.
function downloadBillingExcel(){
  if(billing.length===0){ toast('No billing records to export.'); return; }
  const sortedBilling = [...billing].sort((a,b)=> b.billDate.localeCompare(a.billDate) || a.id.localeCompare(b.id));
  const rows = buildBillingExportRows(sortedBilling);
  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = BILLING_EXCEL_COL_WIDTHS;
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Billing');
  XLSX.writeFile(wb, `billing-all-${new Date().toISOString().slice(0,10)}.xlsx`);
  toast(`${rows.length} billing line(s) exported to Excel (all documents).`);
}

function moveEditLine(i, dir){
  const j = i+dir;
  if(j<0 || j>=editOrderDraft.length) return;
  [editOrderDraft[i], editOrderDraft[j]] = [editOrderDraft[j], editOrderDraft[i]];
}

function syncEditOrderDraftFromForm(){
  editOrderDraft.forEach((l,i)=>{
    const diaEl = document.querySelector(`[data-edit-line-dia="${i}"]`);
    const gradeEl = document.querySelector(`[data-edit-line-grade="${i}"]`);
    const qtyEl = document.querySelector(`[data-edit-line-qty="${i}"]`);
    if(diaEl) l.dia = Number(diaEl.value);
    if(gradeEl) l.grade = gradeEl.value;
    if(qtyEl) l.qty = Number(qtyEl.value);
  });
}

function saveEditOrder(id){
  const o = orders.find(x=>x.id===id);
  if(!o) return;
  syncEditOrderDraftFromForm();
  const customer = document.getElementById('e-o-customer').value.trim();
  if(!customer){ toast('Enter a customer name.'); return; }
  if(editOrderDraft.length===0){ toast('Order must have at least one line — add a line or delete the order instead.'); return; }
  for(const l of editOrderDraft){
    if(!l.qty || l.qty<=0){ toast('Every line needs a quantity greater than 0.'); return; }
  }
  // return all currently allocated stock from the old version of this order
  o.items.forEach(it=>{
    const allocated = it.allocated||0;
    if(allocated>0){
      const s = findStock(it.dia, it.grade);
      if(s) s.qty += allocated;
    }
  });
  // rebuild items from the edited draft, then re-run the full priority queue
  // across every order — this edit competes fairly (or unfairly, per its
  // priority) with all other pending demand, not just against leftovers
  o.items = editOrderDraft.map(l=>({dia:l.dia, grade:l.grade, qty:l.qty, allocated:0, status:'pending'}));
  o.customer = customer;
  reallocateAllByPriority();
  closeModal();
  toast(`${id} updated — stock reallocated across all orders by priority.`);
  render();
}

/* ============== ORDER EXCEL UPLOAD ============== */
function handleOrderExcelFile(file){
  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, {type:'array'});
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, {defval:''});
      processUploadedOrderRows(rows, file.name);
    }catch(err){
      showOrderUploadSummary({ordersCreated:0, linesAdded:0, errors:[`Could not read "${file.name}": ${err.message}`]});
    }
  };
  reader.onerror = function(){
    showOrderUploadSummary({ordersCreated:0, linesAdded:0, errors:[`Failed to load "${file.name}".`]});
  };
  reader.readAsArrayBuffer(file);
}

function processUploadedOrderRows(rows, filename){
  const errors = [];
  const groups = {}; // key: customer||date -> {customer, date, items:[]}

  rows.forEach((row, idx)=>{
    const rowNum = idx+2;
    const customerRaw = pickValue(row, ['customer','customername','client']);
    const diaRaw = pickValue(row, ['diameter','dia','size','diametermm']);
    const gradeRaw = pickValue(row, ['grade','steelgrade']);
    const qtyRaw = pickValue(row, ['quantity','qty','quantitymt']);
    const dateRaw = pickValue(row, ['date','orderdate']);

    if(customerRaw===undefined || diaRaw===undefined || gradeRaw===undefined || qtyRaw===undefined){
      errors.push(`Row ${rowNum}: missing Customer, Diameter, Grade, or Quantity — skipped.`);
      return;
    }
    const dia = parseInt(String(diaRaw).replace(/[^0-9.]/g,''), 10);
    const grade = String(gradeRaw).trim();
    const qty = parseFloat(qtyRaw);
    const customer = String(customerRaw).trim();
    let date = dateRaw ? String(dateRaw).trim() : new Date().toISOString().slice(0,10);
    if(date.length===10 && date.includes('/')) {
      // try normalize dd/mm/yyyy style, fallback to original string if odd
      const parts = date.split('/');
      if(parts.length===3) date = `${parts[2]}-${parts[1].padStart(2,'0')}-${parts[0].padStart(2,'0')}`;
    }

    if(!dia || isNaN(qty) || !customer){
      errors.push(`Row ${rowNum}: invalid customer, diameter, or quantity — skipped.`);
      return;
    }

    const key = customer+'||'+date;
    if(!groups[key]) groups[key] = {customer, date, items:[]};
    groups[key].items.push({dia, grade, qty, allocated:0, status:'pending'});
  });

  let ordersCreated = 0, linesAdded = 0;
  Object.values(groups).forEach(g=>{
    const id = 'ORD-'+(orderSeq++);
    g.items.forEach(it=>fulfillItem(it));
    orders.push({id, customer:g.customer, date:g.date, items:g.items});
    ordersCreated++;
    linesAdded += g.items.length;
  });
  ensureOrderPriorities();

  showOrderUploadSummary({ordersCreated, linesAdded, errors, filename});
  render();
}

function showOrderUploadSummary({ordersCreated, linesAdded, errors, filename}){
  const box = document.getElementById('orderUploadSummary');
  if(!box){ toast(`Order upload processed: ${ordersCreated} orders, ${linesAdded} lines.`); return; }
  let html = `<div class="upload-summary">`;
  if(filename) html += `Processed <b style="color:var(--text)">${filename}</b><br>`;
  html += `<span class="new">${ordersCreated} order(s) created</span> · <span class="upd">${linesAdded} line(s) added</span>`;
  if(errors.length){
    html += `<br><span class="err">${errors.length} row(s) skipped:</span><br>` + errors.slice(0,6).map(e=>`&nbsp;&nbsp;${e}`).join('<br>');
    if(errors.length>6) html += `<br>&nbsp;&nbsp;...and ${errors.length-6} more.`;
  }
  html += `</div>`;
  box.innerHTML = html;
  toast(`Order file processed: ${ordersCreated} orders, ${linesAdded} lines.`);
}

function handleCustomerExcelFile(file, mode){
  mode = mode || 'add';
  if(mode==='replace' && customers.length>0){
    if(!confirm(`Replace ALL ${customers.length} existing customer(s) with the contents of "${file.name}"? This cannot be undone.`)) return;
  }
  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, {type:'array'});
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, {defval:''});
      processUploadedCustomerRows(rows, file.name, mode);
    }catch(err){
      showCustomerUploadSummary({added:0, updated:0, errors:[`Could not read "${file.name}": ${err.message}`]});
    }
  };
  reader.onerror = function(){
    showCustomerUploadSummary({added:0, updated:0, errors:[`Failed to load "${file.name}".`]});
  };
  reader.readAsArrayBuffer(file);
}

function processUploadedCustomerRows(rows, filename, mode){
  mode = mode || 'add';
  let added = 0, updated = 0;
  const errors = [];
  const removedCount = (mode==='replace') ? customers.length : 0;
  if(mode==='replace') customers = [];
  const seenInFile = new Set();

  rows.forEach((row, idx)=>{
    const rowNum = idx+2;
    const codeRaw = pickValue(row, ['customer','customercode','code','sap customer','soldtoparty','shiptoparty']);
    const nameRaw = pickValue(row, ['name1','name','customername','name 1']);
    const cityRaw = pickValue(row, ['city','shiptopartycity','town']);

    if(codeRaw===undefined || String(codeRaw).trim()===''){
      errors.push(`Row ${rowNum}: missing Customer code — skipped.`);
      return;
    }
    const code = String(codeRaw).trim();
    if(seenInFile.has(code)) return; // dedupe repeated rows for same customer code within the file
    seenInFile.add(code);
    const name = nameRaw!==undefined ? String(nameRaw).trim() : '';
    const city = cityRaw!==undefined ? String(cityRaw).replace(/\u00a0/g,'').trim() : '';
    const type = customerTypeFromCode(code);

    let c = findCustomer(code);
    if(c){
      if(name) c.name = name;
      if(city) c.city = city;
      c.type = type;
      updated++;
    } else {
      if(!name){ errors.push(`Row ${rowNum}: missing Name for new customer ${code} — skipped.`); return; }
      customers.push({code, name, city, type});
      added++;
    }
  });

  showCustomerUploadSummary({added, updated, errors, filename, mode, removedCount});
  render();
}

function showCustomerUploadSummary({added, updated, errors, filename, mode, removedCount}){
  const box = document.getElementById('customerUploadSummary');
  const replaced = mode==='replace';
  if(!box) { toast(`Customer upload processed: ${added} added, ${updated} updated.`); return; }
  let html = `<div class="upload-summary">`;
  if(filename) html += `Processed <b style="color:var(--text)">${filename}</b>${replaced ? ' (replaced entire customer list)' : ''}<br>`;
  if(replaced) html += `<span class="err">${removedCount} prior customer(s) cleared</span> · `;
  html += `<span class="new">${added} added</span> · <span class="upd">${updated} updated</span>`;
  if(errors.length){
    html += `<br><span class="err">${errors.length} row(s) skipped:</span><br>` + errors.slice(0,6).map(e=>`&nbsp;&nbsp;${e}`).join('<br>');
    if(errors.length>6) html += `<br>&nbsp;&nbsp;...and ${errors.length-6} more.`;
  }
  html += `</div>`;
  box.innerHTML = html;
  toast(replaced ? `Customer list replaced: ${added} loaded from file.` : `Customer file processed: ${added} added, ${updated} updated.`);
}

/* ============== EXCEL UPLOAD ============== */
function normalizeKey(k){
  return String(k).toLowerCase().replace(/[^a-z0-9]/g,'');
}
function pickValue(row, candidates){
  const map = {};
  Object.keys(row).forEach(k=> map[normalizeKey(k)] = row[k]);
  for(const c of candidates){
    if(map[normalizeKey(c)] !== undefined && map[normalizeKey(c)] !== '') return map[normalizeKey(c)];
  }
  return undefined;
}

function handleExcelFile(file, mode){
  mode = mode || 'add';
  if(mode==='replace' && stock.length>0){
    if(!confirm(`Replace ALL ${stock.length} existing inventory line(s) with the contents of "${file.name}"? This cannot be undone.`)) return;
  }
  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, {type:'array'});
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, {defval:''});
      processUploadedRows(rows, file.name, mode);
    }catch(err){
      showUploadSummary({added:0, updated:0, errors:[`Could not read "${file.name}": ${err.message}`]});
    }
  };
  reader.onerror = function(){
    showUploadSummary({added:0, updated:0, errors:[`Failed to load "${file.name}".`]});
  };
  reader.readAsArrayBuffer(file);
}

function processUploadedRows(rows, filename, mode){
  mode = mode || 'add';
  let added = 0, updated = 0;
  const errors = [];
  const removedCount = (mode==='replace') ? stock.length : 0;
  if(mode==='replace') stock = [];

  rows.forEach((row, idx)=>{
    const rowNum = idx+2; // account for header row
    const diaRaw = pickValue(row, ['diameter','dia','size','diametermm']);
    const gradeRaw = pickValue(row, ['grade','steelgrade']);
    const qtyRaw = pickValue(row, ['quantity','qty','quantitymt','stock','currentstock']);
    const reorderRaw = pickValue(row, ['reorderlevel','reorder','reorderqty','minlevel']);
    const capacityRaw = pickValue(row, ['capacity','yardcapacity','maxcapacity']);

    if(diaRaw===undefined || gradeRaw===undefined || qtyRaw===undefined){
      errors.push(`Row ${rowNum}: missing Diameter, Grade, or Quantity — skipped.`);
      return;
    }

    const dia = parseInt(String(diaRaw).replace(/[^0-9.]/g,''), 10);
    const grade = String(gradeRaw).trim();
    const qty = parseFloat(qtyRaw);

    if(!dia || isNaN(qty)){
      errors.push(`Row ${rowNum}: invalid diameter or quantity — skipped.`);
      return;
    }

    let s = findStock(dia, grade);
    if(s){
      s.qty = qty;
      if(reorderRaw!==undefined && !isNaN(parseFloat(reorderRaw))) s.reorder = parseFloat(reorderRaw);
      if(capacityRaw!==undefined && !isNaN(parseFloat(capacityRaw))) s.capacity = parseFloat(capacityRaw);
      updated++;
    } else {
      s = {
        dia, grade, qty,
        reorder: (reorderRaw!==undefined && !isNaN(parseFloat(reorderRaw))) ? parseFloat(reorderRaw) : Math.round(qty*0.6),
        capacity: (capacityRaw!==undefined && !isNaN(parseFloat(capacityRaw))) ? parseFloat(capacityRaw) : Math.round(qty*2.5) || 40,
      };
      stock.push(s);
      added++;
    }
  });

  const changed = reallocateAllByPriority();
  showUploadSummary({added, updated, errors, filename, mode, removedCount, changed});
  render();
}

function showUploadSummary({added, updated, errors, filename, mode, removedCount, changed}){
  const box = document.getElementById('uploadSummary');
  const replaced = mode==='replace';
  const fulfillNote = changed>0 ? ` ${changed} order line(s) auto-allocated by priority.` : '';
  if(!box) { toast(`Upload processed: ${added} added, ${updated} updated.${fulfillNote}`); return; }
  let html = `<div class="upload-summary">`;
  if(filename) html += `Processed <b style="color:var(--text)">${filename}</b>${replaced ? ' (replaced entire inventory)' : ''}<br>`;
  if(replaced) html += `<span class="err">${removedCount} prior line(s) cleared</span> · `;
  html += `<span class="new">${added} line(s) added</span> · <span class="upd">${updated} line(s) updated</span>`;
  if(changed>0) html += ` · <span class="upd">${changed} order line(s) auto-allocated by priority</span>`;
  if(errors.length){
    html += `<br><span class="err">${errors.length} row(s) skipped:</span><br>` + errors.slice(0,6).map(e=>`&nbsp;&nbsp;${e}`).join('<br>');
    if(errors.length>6) html += `<br>&nbsp;&nbsp;...and ${errors.length-6} more.`;
  }
  html += `</div>`;
  box.innerHTML = html;
  toast(replaced ? `Inventory replaced: ${added} line(s) loaded from file.${fulfillNote}` : `Stock file processed: ${added} added, ${updated} updated.${fulfillNote}`);
}

function downloadTemplate(){
  const ws = XLSX.utils.json_to_sheet([
    {Diameter:8, Grade:'SS-500', Quantity:25.5, 'Reorder Level':25, Capacity:60},
    {Diameter:12, Grade:'SS-600', Quantity:14, 'Reorder Level':20, Capacity:50},
  ]);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Stock');
  XLSX.writeFile(wb, 'stock-upload-template.xlsx');
}

function receiveStock(){
  const dia = Number(document.getElementById('s-dia').value);
  const grade = document.getElementById('s-grade').value;
  const qty = Number(document.getElementById('s-qty').value);
  if(!qty || qty<=0){ toast('Enter a valid quantity.'); return; }

  let s = findStock(dia,grade);
  if(!s){
    s = {dia, grade, qty:0, reorder:20, capacity:50};
    stock.push(s);
  }
  s.qty += qty;
  const changed = reallocateAllByPriority();
  toast(`Added ${fmt(qty)} MT to ⌀${dia}mm ${grade} stock.${changed>0?` Auto-allocated to ${changed} highest-priority line(s).`:''}`);
  render();
}

function deleteStockLine(dia, grade){
  const s = findStock(dia, grade);
  if(!s) return;
  const demand = pendingDemandFor(dia, grade);
  const warn = demand>0 ? ` There is ${fmt(demand)} MT of unfulfilled order demand for this line.` : '';
  if(!confirm(`Delete ⌀${dia}mm ${grade} stock line (${fmt(s.qty)} MT)?${warn}`)) return;
  stock = stock.filter(x=>!(x.dia===dia && x.grade===grade));
  toast(`⌀${dia}mm ${grade} stock line deleted.`);
  render();
}

function openEditStockModal(dia, grade){
  const s = findStock(dia, grade);
  if(!s) return;
  const box = document.getElementById('modalBox');
  box.innerHTML = `
    <div class="modal-title">Edit Stock Line</div>
    <div class="form-grid" style="grid-template-columns:repeat(2,1fr);">
      <div class="field"><label>Diameter (mm)</label>
        <select id="e-s-dia">${DIAMETERS.map(d=>`<option value="${d}" ${d===s.dia?'selected':''}>${d}mm</option>`).join('')}</select>
      </div>
      <div class="field"><label>Grade</label>
        <select id="e-s-grade">${GRADES.map(g=>`<option value="${g}" ${g===s.grade?'selected':''}>${g}</option>`).join('')}</select>
      </div>
      <div class="field"><label>Quantity (MT)</label><input id="e-s-qty" type="number" min="0" step="0.1" value="${s.qty}"></div>
      <div class="field"><label>Reorder Level (MT)</label><input id="e-s-reorder" type="number" min="0" step="0.1" value="${s.reorder}"></div>
      <div class="field"><label>Capacity (MT)</label><input id="e-s-capacity" type="number" min="0.1" step="0.1" value="${s.capacity}"></div>
    </div>
    <div class="modal-actions">
      <button class="btn secondary" id="modalCancelBtn">Cancel</button>
      <button class="btn" id="modalSaveBtn">Save Changes</button>
    </div>
  `;
  document.getElementById('modalCancelBtn').addEventListener('click', closeModal);
  document.getElementById('modalSaveBtn').addEventListener('click', ()=>saveEditStock(dia, grade));
  showModal();
}

function saveEditStock(origDia, origGrade){
  const dia = Number(document.getElementById('e-s-dia').value);
  const grade = document.getElementById('e-s-grade').value;
  const qty = Number(document.getElementById('e-s-qty').value);
  const reorder = Number(document.getElementById('e-s-reorder').value);
  const capacity = Number(document.getElementById('e-s-capacity').value);
  if(isNaN(qty) || qty<0 || isNaN(reorder) || reorder<0 || isNaN(capacity) || capacity<=0){
    toast('Enter valid numbers for quantity, reorder level and capacity.');
    return;
  }
  const collision = findStock(dia, grade);
  if(collision && !(dia===origDia && grade===origGrade)){
    toast(`A stock line for ⌀${dia}mm ${grade} already exists — delete or merge it first.`);
    return;
  }
  const s = findStock(origDia, origGrade);
  s.dia = dia; s.grade = grade; s.qty = qty; s.reorder = reorder; s.capacity = capacity;
  closeModal();
  toast(`⌀${dia}mm ${grade} stock line updated.`);
  render();
}

/* ============== RENDER: MANUFACTURING PLAN ============== */
function renderManufacture(){
  const needs = manufacturingNeeds();
  const enriched = needs.map(s=>{
    const demand = pendingDemandFor(s.dia,s.grade);
    const recommend = Math.max(0, s.reorder + demand - s.qty);
    return {...s, demand, recommend};
  });
  const totalRecommend = enriched.reduce((a,s)=>a+s.recommend,0);

  document.getElementById('main').innerHTML = `
    <div class="page-head">
      <div>
        <div class="page-title">Manufacturing Plan</div>
        <div class="page-desc">Diameters that have fallen below reorder level, ranked by what the mill should roll next</div>
      </div>
    </div>

    <div class="stats" style="grid-template-columns:repeat(3,1fr);">
      <div class="stat" style="--bar:var(--danger)">
        <div class="label">Lines Needing Production</div>
        <div class="value">${enriched.length}</div>
        <div class="sub">out of ${stock.length} total lines</div>
      </div>
      <div class="stat" style="--bar:var(--amber)">
        <div class="label">Recommended Roll Quantity</div>
        <div class="value">${fmt(totalRecommend)} MT</div>
        <div class="sub">covers reorder buffer + open orders</div>
      </div>
      <div class="stat" style="--bar:var(--accent)">
        <div class="label">Open Order Demand</div>
        <div class="value">${fmt(orders.reduce((a,o)=>a+o.items.filter(it=>it.status!=='fulfilled').reduce((s,it)=>s+(it.qty-(it.allocated||0)),0),0))} MT</div>
        <div class="sub">across pending orders</div>
      </div>
    </div>

    <div class="card">
      <div class="card-head">
        <div class="card-title">Production Priority Queue</div>
      </div>
      ${enriched.length===0 ? `<div class="empty">Every diameter and grade is at or above its reorder level. <b>Mill is idle on rebar — no urgent rolling needed.</b></div>` :
      `<table>
        <thead><tr><th>Priority</th><th>Diameter</th><th>Grade</th><th>Current Stock</th><th>Reorder Level</th><th>Pending Orders</th><th>Recommended to Roll</th></tr></thead>
        <tbody>
        ${enriched.map((s,i)=>`
          <tr>
            <td>${i+1}</td>
            <td class="name">⌀${s.dia}mm</td>
            <td>${s.grade}</td>
            <td>${fmt(s.qty)} MT</td>
            <td>${fmt(s.reorder)} MT</td>
            <td>${s.demand>0 ? fmt(s.demand)+' MT' : '—'}</td>
            <td><span class="pill ${i===0?'crit':'low'}">${fmt(s.recommend)} MT</span></td>
          </tr>`).join('')}
        </tbody>
      </table>`}
      <div class="section-note">Recommended quantity = max(reorder shortfall, unfulfilled order demand minus current stock). Adjust reorder levels in code to match real safety-stock policy.</div>
    </div>
  `;
}

/* ============== ROUTER ============== */
function render(skipSave){
  if(!skipSave) saveData();
  if(PASSWORD_PROTECTED_TABS.includes(activeTab) && !isRestrictedUnlocked()) activeTab = 'dashboard';
  renderNav();
  if(activeTab==='dashboard') renderDashboard();
  else if(activeTab==='orders') renderOrders();
  else if(activeTab==='billing') renderBilling();
  else if(activeTab==='customers') renderCustomers();
  else if(activeTab==='stock') renderStock();
  else if(activeTab==='manufacture') renderManufacture();
}

/* ============== INIT (async: waits for Supabase to load data first) ============== */
async function init(){
  const persisted = await loadData();
  if(persisted){
    stock = persisted.stock;
    orders = persisted.orders;
    orderSeq = persisted.orderSeq;
    billing = persisted.billing || [];
    billingSeq = persisted.billingSeq || DEFAULT_BILLING_SEQ;
    customers = (persisted.customers && persisted.customers.length) ? persisted.customers : JSON.parse(JSON.stringify(DEFAULT_CUSTOMERS));
  } else {
    stock = JSON.parse(JSON.stringify(DEFAULT_STOCK));
    orders = JSON.parse(JSON.stringify(DEFAULT_ORDERS));
    orderSeq = DEFAULT_ORDER_SEQ;
    billing = JSON.parse(JSON.stringify(DEFAULT_BILLING));
    billingSeq = DEFAULT_BILLING_SEQ;
    customers = JSON.parse(JSON.stringify(DEFAULT_CUSTOMERS));
  }
  ensureOrderPriorities();
  const overlay = document.getElementById('loadingOverlay');
  if(overlay) overlay.remove();
  render(true); // initial paint — no need to immediately re-save what we just loaded
}

/* ============== AUTH ==============
   Simple, client-side-only login gate. Credentials are hardcoded in this file,
   which means anyone who views the page source can read them — this is NOT
   real security, just a basic access screen. Don't use it to protect anything
   truly sensitive without a proper backend/auth provider.
*/
const AUTH_USER = 'JINDAL';
const AUTH_PASS = 'Jindal@1234567';
const AUTH_SESSION_KEY = 'rebar-auth-session';

function showApp(){
  const login = document.getElementById('loginScreen');
  if(login) login.remove();
  const overlay = document.getElementById('loadingOverlay');
  if(overlay) overlay.style.display = 'flex';
  init();
}

function attemptLogin(e){
  e.preventDefault();
  const user = document.getElementById('loginUser').value.trim();
  const pass = document.getElementById('loginPass').value;
  const errEl = document.getElementById('loginError');
  if(user === AUTH_USER && pass === AUTH_PASS){
    sessionStorage.setItem(AUTH_SESSION_KEY, 'true');
    showApp();
  } else {
    errEl.textContent = 'Incorrect username or password.';
  }
}

function logout(){
  sessionStorage.removeItem(AUTH_SESSION_KEY);
  location.reload();
}

document.getElementById('loginForm').addEventListener('submit', attemptLogin);
document.getElementById('logoutLink').addEventListener('click', (e)=>{ e.preventDefault(); logout(); });

if(sessionStorage.getItem(AUTH_SESSION_KEY) === 'true'){
  showApp();
} else {
  document.getElementById('loginUser').focus();
}
</script>
